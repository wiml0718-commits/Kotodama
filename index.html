/* ----------------------- speech ----------------------- */
let JP_VOICE = null;
function pickVoice() {
  try {
    const vs = window.speechSynthesis?.getVoices?.() || [];
    JP_VOICE = vs.find(v => /ja[-_]?JP/i.test(v.lang)) || vs.find(v => /japan/i.test(v.name)) || null;
  } catch (e) {}
}
if (typeof window !== "undefined" && window.speechSynthesis) {
  pickVoice();
  window.speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text) {
  try {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP"; u.rate = 0.82; u.pitch = 1.0;
    if (JP_VOICE) u.voice = JP_VOICE;
    window.speechSynthesis.speak(u);
  } catch (e) {}
}

/* ----------------------- storage ----------------------- */
const SAVE_KEY = "kotodama:save:v1";
const mem = {};
// Persists to the browser's localStorage (with an in-memory fallback).
async function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : (mem[SAVE_KEY] || null);
  } catch (e) { return mem[SAVE_KEY] || null; }
}
async function writeSave(obj) {
  mem[SAVE_KEY] = obj;
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(obj)); } catch (e) {}
}

/* ----------------------- 亡魂（前章復習）の生成 ----------------------- */
// 各章のボスに挑む前に、前の章の内容を試す「亡魂」を倒さねばならない。
// （熟練度システムは廃止。心流を保つための復習関門として機能する。）
function pickN(arr, n) { return shuffle(arr).slice(0, n); }
function makeRevenant(region, prevRegion) {
  const prevNodes = ALL_RAW.filter(n => n.region === prevRegion);
  const prevName = (REGIONS.find(r => r.id === prevRegion) || {}).name || "前章";
  const pool = prevNodes.flatMap(n => n.quiz || []);
  return {
    id: region + "-revenant", region, revenant: true, icon: "crown",
    title: "前章の亡魂", romaji: "Revenant of the Past",
    intro: `挑戰本章頭目之前，『${prevName}』的亡魂凝聚成形、攔在路上。重新擊敗它——證明你並未忘記上一章學過的言靈。`,
    hp: 200, atk: 17,
    quiz: pickN(pool, Math.min(10, pool.length)),
  };
}

    { kind: "mc", prompt: "「反語」表示？", answer: "用問句表達相反的意思", choices: ["用問句表達相反的意思", "重複語句", "外來語", "敬語"] },
    { kind: "mc", prompt: "「と言っても過言ではない」意思？", answer: "說…也不為過", choices: ["說…也不為過", "說錯了", "別說了", "難以啟齒"] },
    { kind: "mc", prompt: "「猫の手も借りたい」意思？", answer: "忙得不可開交", choices: ["忙得不可開交", "喜歡貓", "很空閒", "想養貓"] },
    { kind: "mc", prompt: "「自業自得」意思？", answer: "自作自受", choices: ["自作自受", "自食其力", "自由自在", "一舉兩得"] },
    { kind: "listen", jp: "いそがばまわれ", answer: "欲速則不達", choices: ["欲速則不達", "屢敗屢戰", "務實勝過風雅", "樹大招風"] },
  ],
};

// 章ごとの素のノード（亡魂生成のために先に並べる）
const ALL_RAW = [...PROLOGUE, BOSS_P0, ...LESSONS, BOSS, ...A2_LESSONS, BOSS_A2, ...B1_LESSONS, BOSS_B1, ...B2_LESSONS, BOSS_B2, ...C1_LESSONS, BOSS_C1, ...C2_LESSONS, BOSS_C2];

// 各コンテンツ章のボス直前に亡魂を挿し込む（最初の章 P0 を除く）
const REV_A1 = makeRevenant("A1", "P0");
const REV_A2 = makeRevenant("A2", "A1");
const REV_B1 = makeRevenant("B1", "A2");
const REV_B2 = makeRevenant("B2", "B1");
const REV_C1 = makeRevenant("C1", "B2");
const REV_C2 = makeRevenant("C2", "C1");
const ALL_NODES = [
  ...PROLOGUE, BOSS_P0,
  ...LESSONS, REV_A1, BOSS,
  ...A2_LESSONS, REV_A2, BOSS_A2,
  ...B1_LESSONS, REV_B1, BOSS_B1,
  ...B2_LESSONS, REV_B2, BOSS_B2,
  ...C1_LESSONS, REV_C1, BOSS_C1,
  ...C2_LESSONS, REV_C2, BOSS_C2,
];

/* ----------------------- 進行ヘルパー（熟練度ゲート廃止） ----------------------- */
function regionNodes(regionId) { return ALL_NODES.filter(n => n.region === regionId); }
function regionCleared(save, regionId) {
  const boss = ALL_NODES.find(n => n.region === regionId && n.id.endsWith("boss"));
  return !!(boss && save.done[boss.id]);
}
// 後方互換：以前 regionMastered を参照していた箇所のため
const regionMastered = regionCleared;
function regionUnlocked(save, regionId) {
  const idx = REGIONS.findIndex(r => r.id === regionId);
  if (idx <= 0) return true;
  return regionCleared(save, REGIONS[idx - 1].id);
}
function regionQuestStats(save, regionId) {
  const nodes = regionNodes(regionId);
  const done = nodes.filter(n => save.done[n.id]).length;
  return { done, total: nodes.length };
}

/* ----------------------- helpers ----------------------- */
const xpToNext = (lv) => 60 + lv * 50;
function freshSave() {
  return {
    name: "転生者", lv: 1, xp: 0, hp: 100, maxHp: 100, mp: 30, maxMp: 30,
    gold: 0, region: "P0", done: {}, codex: {}, srs: {},
    furigana: true, created: Date.now(),
  };
}
function clamp(n, a, b) { return Math.max(a, Math.min(b, n)); }
function shuffle(a) { const r = [...a]; for (let i = r.length - 1; i > 0; i--) { const j = (Math.random() * (i + 1)) | 0;[r[i], r[j]] = [r[j], r[i]]; } return r; }
const ICONS = { scroll: Scroll, sparkles: Sparkles, flame: Flame, zap: Zap, crown: Crown };

/* ============================================================
   ROOT
   ============================================================ */
export default function App() {
  const [save, setSave] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState("title");
  const [activeNode, setActiveNode] = useState(null);
  const [result, setResult] = useState(null);

  useEffect(() => {
    let on = true;
    loadSave().then(s => { if (!on) return; setSave(s); setLoaded(true); });
    return () => { on = false; };
  }, []);

  const persist = useCallback((next) => { setSave(next); writeSave(next); }, []);

  const startNew = () => { const s = freshSave(); persist(s); setView("hub"); };
  const continueGame = () => setView("hub");

  if (!loaded) {
    return (<div className="kw-root"><style>{THEME_CSS}</style>
      <div className="kw-shell" style={{ alignItems: "center", justifyContent: "center" }}>
        <div className="kw-brush kw-glow" style={{ fontSize: 40, color: "var(--gold)" }}>言霊</div>
        <div style={{ color: "var(--muted)", fontFamily: "var(--ui)", marginTop: 10 }}>記憶を呼び覚ましています…</div>
      </div></div>);
  }

  return (
    <div className="kw-root">
      <style>{THEME_CSS}</style>
      <div className="kw-shell">
        {view === "title" && <Title save={save} onNew={startNew} onContinue={continueGame} />}
        {view === "hub" && <Hub save={save} persist={persist}
          onMap={() => setView("map")} onCodex={() => setView("codex")} onReview={() => setView("review")}
          onLesson={(node) => { setActiveNode(node); setView("lesson"); }} />}
        {view === "map" && <WorldMap save={save} onBack={() => setView("hub")}
          onEnter={(regionId) => {
            const next = ALL_NODES.filter(n => n.region === regionId).find(n => !save.done[n.id])
              || ALL_NODES.find(n => n.region === regionId);
            if (regionId !== save.region) persist({ ...save, region: regionId });
            setActiveNode(next); setView("lesson");
          }} />}
        {view === "codex" && <Codex save={save} onBack={() => setView("hub")} />}
        {view === "review" && <Review save={save} persist={persist} onBack={() => setView("hub")} />}
        {view === "lesson" && <Lesson node={activeNode} save={save}
          onExit={() => setView("hub")}
          onBattle={() => setView("battle")} />}
        {view === "battle" && <Battle node={activeNode} save={save} persist={persist}
          onWin={(res) => { setResult(res); setView("result"); }}
          onFlee={() => setView("hub")} />}
        {view === "result" && <ResultScreen result={result} node={activeNode} onHome={() => setView("hub")} />}
      </div>
    </div>
  );
}

  const codexCount = Object.keys(save.codex).length;
  const dueCount = Object.values(save.srs).filter(s => s.due <= Date.now()).length;

  return (
    <div className="kw-fade" style={{ flex: 1, display: "flex", flexDirection: "column", padding: 16, paddingBottom: 86 }}>

        <div style={{ display: "flex", gap: 10, marginTop: 12 }}>

        </div>
      </div>

      {/* review banner */}
      {dueCount > 0 && (

      <BottomNav active="home" onMap={onMap} onCodex={onCodex} onReview={onReview} dueCount={dueCount} />

  );
}

/* ============================================================
   WORLD MAP (CEFR)
   ============================================================ */

}

                {[0, 1, 2, 3, 4].map(s => <Star key={s} size={11} color={s < (it.mastery || 0) ? "var(--gold)" : "var(--line)"} fill={s < (it.mastery || 0) ? "var(--gold)" : "none"} />)}
              </div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ============================================================
   LESSON  (teach phase)
   ============================================================ */
function FuriWord({ item, furigana, big }) {
  return (
    <div style={{ textAlign: "center" }}>
      {furigana && item.romaji && (
        <div className="kw-num" style={{ fontSize: big ? 14 : 11, color: "var(--mana)", letterSpacing: ".06em" }}>{item.romaji}</div>
      )}
      <div className="kw-rune" style={{ fontSize: big ? 56 : 30, fontWeight: 700, lineHeight: 1.15 }}>{item.jp}</div>
    </div>
  );
}

function Lesson({ node, save, onExit, onBattle }) {
  const [i, setI] = useState(0);
  const teach = node.teach || [];
  const [phase, setPhase] = useState("intro"); // intro -> cards

  useEffect(() => { if (phase === "cards") { const c = teach[i]; if (c) speak(c.reading || c.jp); } }, [i, phase]);

  const Ico = ICONS[node.icon] || Scroll;
  const isBoss = node.id.endsWith("boss");
  const isRev = !!node.revenant;
  const big = isBoss || isRev;
  const accent = isRev ? "#8ab4ff" : isBoss ? "var(--violet)" : "var(--gold)";
  const accentBg = isRev ? "rgba(138,180,255,.16)" : isBoss ? "rgba(167,139,250,.16)" : "rgba(245,196,81,.13)";
  const accentBorder = isRev ? "#5a6a8f" : isBoss ? "#7a3f8f" : "var(--gold-dim)";

  if (phase === "intro") {
    return (
      <div className="kw-fade" style={{ flex: 1, display: "flex", flexDirection: "column", padding: 18 }}>
        <TopBar title={node.title} sub={node.romaji} onBack={onExit} />
        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
          <div className="kw-pop" style={{ width: 76, height: 76, borderRadius: 20, margin: "0 auto 18px",
            display: "flex", alignItems: "center", justifyContent: "center",
            background: accentBg, border: `1.5px solid ${accentBorder}` }}>
            {isRev ? <span style={{ fontSize: 38 }}>👻</span> : <Ico size={38} color={accent} />}
          </div>
          <div className="kw-scroll kw-mincho" style={{ padding: "22px 20px", fontSize: 16, lineHeight: 2 }}>
            {node.intro}
          </div>
        </div>
        <button className="kw-btn kw-btn-gold" style={{ marginTop: 16 }}
          onClick={() => big ? onBattle() : setPhase("cards")}>
          {big ? <>戦いを始める <Swords size={18} /></> : <>言霊を授かる <ChevronRight size={18} /></>}
        </button>
      </div>
    );
  }

  // teach cards
  const card = teach[i];
  const last = i === teach.length - 1;
  return (
    <div className="kw-fade" style={{ flex: 1, display: "flex", flexDirection: "column", padding: 18 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
        <button className="kw-tap" onClick={onExit} style={{ background: "none", border: "none", color: "var(--muted)", cursor: "pointer", display: "flex" }}><X size={22} /></button>
        <div className="kw-bar bar-xp" style={{ flex: 1 }}><i style={{ width: `${(i + 1) / teach.length * 100}%` }} /></div>
        <span className="kw-num" style={{ fontSize: 12, color: "var(--muted)" }}>{i + 1}/{teach.length}</span>
      </div>

      <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
        <div className="kw-card" style={{ padding: "34px 22px", textAlign: "center" }}>
          <FuriWord item={card} furigana={save.furigana} big />
          <button className="kw-btn kw-btn-mana kw-tap" style={{ width: "auto", margin: "18px auto 0", padding: "9px 16px", fontSize: 14 }}
            onClick={() => speak(card.reading || card.jp)}>
            <Volume2 size={16} /> 聞く
          </button>
          <div style={{ height: 1, background: "var(--line)", margin: "20px 0" }} />
          <div style={{ fontSize: 20, fontWeight: 700, color: "var(--gold)" }}>{card.meaning}</div>
          {card.note && <div className="kw-mincho" style={{ fontSize: 13, color: "var(--muted)", marginTop: 10, lineHeight: 1.7 }}>{card.note}</div>}
        </div>
      </div>

      <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
        {i > 0 && <button className="kw-btn kw-btn-ghost" style={{ flex: "none", width: 56 }} onClick={() => setI(i - 1)}>←</button>}
        <button className="kw-btn kw-btn-gold" style={{ flex: 1 }}
          onClick={() => last ? onBattle() : setI(i + 1)}>
          {last ? <>魔物が現れた！戦う <Swords size={18} /></> : <>次へ <ChevronRight size={18} /></>}
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   BATTLE  (quiz combat)
   ============================================================ */
function Battle({ node, save, persist, onWin, onFlee }) {
  const isBoss = node.id.endsWith("boss");
  const isRev = !!node.revenant;
  const big = isBoss || isRev;
  const quiz = node.quiz || [];
  const foeAtk = big ? (node.atk || 16) : 14;
  const foeName = isRev ? "前章の亡魂" : isBoss ? node.title : "言ノ葉の魔物";
  const foeEmoji = isRev ? "👻" : node.id === "a2-boss" ? "🦂" : isBoss ? "👑🫧" : "🫧";

  const coresTotal = quiz.length;
  const [remaining, setRemaining] = useState(() => shuffle(quiz));
  const [turn, setTurn] = useState(0);
  const [hp, setHp] = useState(save.hp);
  const [combo, setCombo] = useState(0);
  const [picked, setPicked] = useState(null);
  const [locked, setLocked] = useState(false);
  const [dmg, setDmg] = useState(null);        // foe-hit popup
  const [heroDmg, setHeroDmg] = useState(null); // hero-hit popup
  const [shakeFoe, setShakeFoe] = useState(false);
  const [shakeHero, setShakeHero] = useState(false);
  const [flash, setFlash] = useState(null);
  const attemptsRef = useRef(0);
  const startRef = useRef(Date.now());

  const q = remaining[0];
  const coresLeft = remaining.length;
  const foePct = (coresLeft / coresTotal) * 100;

  useEffect(() => { startRef.current = Date.now(); }, [turn]);

  // STRICT: a question only leaves the queue once answered correctly.
  // Wrong answers re-queue the same item a couple of slots later.
  function resolve(correct) {
    setLocked(true);
    attemptsRef.current += 1;
    if (correct) {
      const fast = Date.now() - startRef.current < 4500;
      const crit = fast && combo >= 2;
      const rest = remaining.slice(1);
      setCombo(c => c + 1);
      setFlash(crit ? "crit" : "hit");
      setShakeFoe(true);
      setDmg({ crit, left: rest.length });
      setTimeout(() => setShakeFoe(false), 360);
      setTimeout(() => {
        setDmg(null); setFlash(null);
        if (rest.length === 0) { finishWin(); return; }
        setRemaining(rest); setPicked(null); setLocked(false); setTurn(t => t + 1);
      }, 1000);
    } else {
      const nh = clamp(hp - foeAtk, 0, save.maxHp);
      const rest = remaining.slice(1);
      const pos = Math.min(2, rest.length);
      const requeued = [...rest.slice(0, pos), remaining[0], ...rest.slice(pos)];
      setCombo(0);
      setFlash("miss");
      setShakeHero(true);
      setHeroDmg(foeAtk);
      setTimeout(() => setShakeHero(false), 360);
      setTimeout(() => setHp(nh), 120);
      setTimeout(() => {
        setHeroDmg(null); setFlash(null);
        if (nh <= 0) { finishLose(); return; }
        setRemaining(requeued); setPicked(null); setLocked(false); setTurn(t => t + 1);
      }, 1150);
    }
  }

  const GRADES = {
    S: { dM: 2, xp: 1.5, gold: 1.5, srsH: 12, color: "var(--gold)" },
    A: { dM: 1, xp: 1.25, gold: 1.25, srsH: 8, color: "var(--mana)" },
    B: { dM: 1, xp: 1.0, gold: 1.0, srsH: 5, color: "var(--violet)" },
    C: { dM: 0, xp: 0.8, gold: 0.8, srsH: 2, color: "var(--rose)" },
  };
  const gradeFor = (acc) => acc >= 1 ? "S" : acc >= 0.85 ? "A" : acc >= 0.7 ? "B" : "C";

  function collectRewards(g) {
    const codex = { ...save.codex };
    const srs = { ...save.srs };
    (node.teach || []).forEach(t => {
      const key = t.jp;
      const prev = codex[key];
      codex[key] = { jp: t.jp, reading: t.reading, romaji: t.romaji, meaning: t.meaning,
        mastery: clamp((prev?.mastery || 0) + g.dM, 0, 5) };
      srs[key] = { due: Date.now() + 1000 * 60 * 60 * g.srsH, ease: (srs[key]?.ease || 0) + (g.dM > 0 ? 1 : 0) };
    });
    return { codex, srs };
  }

  function finishWin() {
    const acc = coresTotal / Math.max(coresTotal, attemptsRef.current);
    const grade = gradeFor(acc);
    const g = GRADES[grade];
    const xpGain = Math.round((big ? 110 : 45) * g.xp);
    const goldGain = Math.round((big ? 70 : 25) * g.gold);
    let lv = save.lv, xp = save.xp + xpGain, maxHp = save.maxHp, maxMp = save.maxMp, leveled = 0;
    while (xp >= xpToNext(lv)) { xp -= xpToNext(lv); lv++; maxHp += 12; maxMp += 6; leveled++; }
    const { codex, srs } = collectRewards(g);
    const done = { ...save.done, [node.id]: true };
    const next = {
      ...save, lv, xp, maxHp, maxMp,
      hp: leveled ? maxHp : Math.max(hp, 1),
      mp: clamp(save.mp + 8, 0, maxMp),
      gold: save.gold + goldGain, done, codex, srs,
    };
    persist(next);
    const wasMastered = regionMastered(save, node.region);
    const nowMastered = regionMastered(next, node.region);
    let breakthrough = null;
    if (!wasMastered && nowMastered) {
      const idx = REGIONS.findIndex(r => r.id === node.region);
      breakthrough = REGIONS[idx + 1] || null;
    }
    onWin({ win: true, xp: xpGain, gold: goldGain, leveled, lv, isBoss, isRev, grade, color: g.color,
      final: isBoss && node.region === REGIONS[REGIONS.length - 1].id,
      accuracy: Math.round(acc * 100), attempts: attemptsRef.current, cores: coresTotal, breakthrough });
  }

  function finishLose() {
    const next = { ...save, hp: Math.max(20, Math.round(save.maxHp * 0.4)) };
    persist(next);
    onWin({ win: false, isBoss });
  }

  return (
    <div className="kw-fade" style={{ flex: 1, display: "flex", flexDirection: "column", padding: 16, position: "relative" }}>
      {/* foe */}
      <div className="kw-card" style={{ padding: 14, position: "relative", overflow: "hidden" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontWeight: 700 }}>{foeName}</span>
          <button className="kw-tap" onClick={onFlee} style={{ background: "none", border: "none", color: "var(--muted)", fontSize: 12, fontFamily: "var(--ui)", cursor: "pointer" }}>逃げる ✕</button>
        </div>
        <div className="kw-bar bar-foe" style={{ marginTop: 8 }}><i style={{ width: `${foePct}%` }} /></div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 6 }}>
          <span className="kw-chip" style={{ borderColor: "var(--line)" }}>残り核 <span className="kw-num" style={{ color: "var(--violet)" }}>{coresLeft}/{coresTotal}</span></span>
          <span style={{ fontFamily: "var(--ui)", fontSize: 10, color: "var(--muted)", letterSpacing: ".04em" }}>全問正解で撃破 · 誤答は再出題</span>
        </div>
        <div className={`${shakeFoe ? "kw-shake" : ""}`} style={{ textAlign: "center", marginTop: 10, position: "relative" }}>
          <div className={big ? "kw-bob" : ""} style={{ fontSize: big ? 76 : 60, filter: flash === "crit" ? "drop-shadow(0 0 18px #f5c451)" : "none" }}>
            {foeEmoji}
          </div>
          {dmg && (
            <div className="kw-dmg" style={{ left: "50%", top: 0, transform: "translateX(-50%)", fontSize: dmg.crit ? 26 : 20, color: dmg.crit ? "var(--gold)" : "var(--leaf)" }}>
              {dmg.crit && <span style={{ fontSize: 12, display: "block", color: "var(--gold)" }}>クリティカル！</span>}✦ 命中！
            </div>
          )}
        </div>
        {combo >= 2 && <div className="kw-num kw-pop" style={{ position: "absolute", top: 12, left: 14, color: "var(--gold)", fontWeight: 700, fontSize: 13 }}>
          {combo} コンボ 🔥
        </div>}
      </div>

      {/* hero hp */}
      <div className={`${shakeHero ? "kw-shake" : ""}`} style={{ marginTop: 12, display: "flex", alignItems: "center", gap: 8, position: "relative" }}>
        <Heart size={16} color="#f0524f" />
        <div className="kw-bar bar-hp" style={{ flex: 1 }}><i style={{ width: `${hp / save.maxHp * 100}%` }} /></div>
        <span className="kw-num" style={{ fontSize: 12, color: "var(--muted)", width: 56, textAlign: "right" }}>{hp}/{save.maxHp}</span>
        {heroDmg && <div className="kw-dmg" style={{ left: 24, top: -8, color: "var(--rose)", fontSize: 20 }}>-{heroDmg}</div>}
      </div>

      {/* question */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", marginTop: 12 }}>
        <QuestionBlock key={turn} q={q} save={save} locked={locked} picked={picked}
          onAnswer={(ok, p) => { setPicked(p); resolve(ok); }} />
      </div>
    </div>
  );
}

function QuestionBlock({ q, save, locked, picked, onAnswer }) {
  const isListen = q.kind === "listen";
  const isKana = q.kind === "kana";
  // Shuffle once per appearance so the correct answer isn't always in the same slot.
  const [choices] = useState(() => shuffle(q.choices || []));

  useEffect(() => { if (isListen) setTimeout(() => speak(q.jp), 350); }, [q]);

  // build-a-sentence uses a dedicated component
  if (q.kind === "build") return <BuildQuestion q={q} locked={locked} onAnswer={onAnswer} />;

  return (
    <div>
      <div style={{ textAlign: "center", marginBottom: 18, minHeight: 90, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center" }}>
        {isListen ? (
          <button className="kw-btn kw-btn-mana" style={{ width: "auto", padding: "16px 22px" }} onClick={() => speak(q.jp)}>
            <Volume2 size={22} /> もう一度聞く
          </button>
        ) : isKana ? (
          <>
            {q.showRomajiPrompt ? (
              <div className="kw-num" style={{ fontSize: 22, color: "var(--mana)" }}>{q.prompt}</div>
            ) : (
              <>
                <div className="kw-rune kw-glow" style={{ fontSize: 80, fontWeight: 700, color: "var(--gold)" }}>{q.jp}</div>
                <div style={{ fontSize: 14, color: "var(--muted)", marginTop: 6 }}>{q.prompt}</div>
              </>
            )}
          </>
        ) : (
          <div style={{ fontSize: 20, fontWeight: 700, lineHeight: 1.6 }}>{q.prompt}</div>
        )}
        {isListen && <div style={{ fontSize: 13, color: "var(--muted)", marginTop: 12 }}>{q.sub || "聞こえた言葉の意味は？"}</div>}
        {isKana && q.showRomajiPrompt && <div style={{ fontSize: 13, color: "var(--muted)", marginTop: 8 }}>{q.prompt}</div>}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: choices.length > 4 ? "1fr 1fr" : "1fr", gap: 10 }}>
        {choices.map((c, idx) => {
          const isAns = c === q.answer;
          let cls = "kw-opt";
          if (locked) {
            if (isAns) cls += " good";
            else if (picked === c) cls += " bad";
            else cls += " dim";
          }
          return (
            <button key={c} className={cls} disabled={locked}
              onClick={() => onAnswer(isAns, c)}>
              <span className="kw-optkey">{String.fromCharCode(65 + idx)}</span>
              <span style={{ flex: 1 }}>{c}</span>
              {locked && isAns && <Check size={18} color="var(--leaf)" />}
              {locked && picked === c && !isAns && <X size={18} color="var(--rose)" />}
            </button>
          );
        })}
      </div>
      {locked && picked !== q.answer && (
        <div className="kw-fade" style={{ marginTop: 14, textAlign: "center", color: "var(--rose)", fontSize: 14 }}>
          正解は <b style={{ color: "var(--gold)" }}>{q.answer}</b> ！次は決めろ。
        </div>
      )}
    </div>
  );
}

function BuildQuestion({ q, locked, onAnswer }) {
  const [chosen, setChosen] = useState([]);
  const [poolOrder] = useState(() => shuffle(q.pool.map((w, i) => ({ w, i }))));
  const [usedIdx, setUsedIdx] = useState([]);

  const reset = () => { setChosen([]); setUsedIdx([]); };
  const submit = () => {
    const ok = chosen.join("") === q.target.join("");
    onAnswer(ok, chosen.join(""));
  };

  return (
    <div>
      <div style={{ textAlign: "center", marginBottom: 16, fontSize: 17, fontWeight: 700 }}>{q.prompt}</div>
      {/* answer line */}
      <div className="kw-card" style={{ minHeight: 60, padding: 12, display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center", justifyContent: "center" }}>
        {chosen.length === 0 && <span style={{ color: "var(--muted)", fontSize: 14 }}>下の言霊をタップして文を作れ</span>}
        {chosen.map((c, k) => (
          <span key={k} className="kw-token" onClick={() => { if (locked) return; const ni = [...usedIdx]; ni.splice(k, 1); setUsedIdx(ni); const nc = [...chosen]; nc.splice(k, 1); setChosen(nc); }}>{c}</span>
        ))}
      </div>
      {/* pool */}
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", marginTop: 16 }}>
        {poolOrder.map(({ w, i }) => (
          <button key={i} className={`kw-token ${usedIdx.includes(i) ? "used" : ""}`}
            disabled={locked || usedIdx.includes(i)}
            onClick={() => { setUsedIdx([...usedIdx, i]); setChosen([...chosen, w]); }}>{w}</button>
        ))}
      </div>
      <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
        <button className="kw-btn kw-btn-ghost" style={{ flex: "none", width: 56 }} disabled={locked} onClick={reset}><RotateCcw size={18} /></button>
        <button className="kw-btn kw-btn-gold" style={{ flex: 1 }} disabled={locked || chosen.length === 0} onClick={submit}>
          詠唱する <Sparkles size={18} />
        </button>
      </div>
      {locked && (
        <div className="kw-fade" style={{ marginTop: 14, textAlign: "center", fontSize: 14, color: chosen.join("") === q.target.join("") ? "var(--leaf)" : "var(--rose)" }}>
          {chosen.join("") === q.target.join("") ? "見事な詠唱だ！" : <>正解：<b style={{ color: "var(--gold)" }}>{q.target.join("")}</b></>}
        </div>
      )}
    </div>
  );
}

   RESULT

        <div className="kw-num kw-glow" style={{ fontSize: 52, fontWeight: 700, lineHeight: 1, color: result.color }}>{result.grade}</div>

            : "打得不錯。經驗值與記憶都有提升。"}

      <div className="kw-card" style={{ width: "100%", maxWidth: 320, padding: 16, marginTop: 16 }}>

        <div style={{ height: 1, background: "var(--line)", margin: "9px 0" }} />
        <Row label="獲得ゴールド" val={`+${result.gold} G`} color="var(--mana)" icon={<Sparkles size={16} color="var(--mana)" />} />
        {result.leveled > 0 && (<>
          <div style={{ height: 1, background: "var(--line)", margin: "9px 0" }} />

        <div className="kw-pop kw-card" style={{ width: "100%", maxWidth: 320, padding: 16, marginTop: 12,
          borderColor: "var(--gold)", background: "linear-gradient(180deg,#3a2f12,#2a2150)" }}>
          <div className="kw-brush kw-title-glint" style={{ fontSize: 22, textAlign: "center" }}>賢者誕生</div>
          <div className="kw-mincho" style={{ fontSize: 13, marginTop: 6, lineHeight: 1.8, textAlign: "center" }}>
            你征服了賢者之塔，走完了從村民到賢者的旅程。<br />
            <b style={{ color: "var(--gold)" }}>A1 → C2 全領域踏破！</b><br />
            言ノ葉世界，已盡在你的掌握。
          </div>
        </div>
      )}

      {result.breakthrough && (
        <div className="kw-pop kw-card" style={{ width: "100%", maxWidth: 320, padding: 14, marginTop: 12,
          borderColor: result.breakthrough.color, background: "linear-gradient(180deg,#2a2150,#241b48)" }}>
          <div className="kw-eyebrow" style={{ color: result.breakthrough.color }}>領域突破！</div>
          <div className="kw-mincho" style={{ fontSize: 13, marginTop: 4, lineHeight: 1.6 }}>
            你擊敗了本章的頭目，新的領域已解放：<br />
            <b className="kw-brush" style={{ color: result.breakthrough.color, fontSize: 17 }}>{result.breakthrough.name}</b>
          </div>
        </div>
      )}

      <button className="kw-btn kw-btn-gold" style={{ marginTop: 22, minWidth: 220 }} onClick={onHome}>
        <Crown size={18} /> 拠点へ戻る
      </button>
    </div>
  );
}
function Row({ label, val, color, icon }) {
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
      <span style={{ display: "flex", alignItems: "center", gap: 8, color: "var(--muted)", fontSize: 14 }}>{icon}{label}</span>
      <span className="kw-num" style={{ fontWeight: 700, color }}>{val}</span>
    </div>
  );
}

/* ============================================================
   REVIEW (SRS / 修行)
   ============================================================ */
function Review({ save, persist, onBack }) {
  const dueKeys = Object.keys(save.srs).filter(k => save.srs[k].due <= Date.now() && save.codex[k]);
  const [queue] = useState(() => shuffle(dueKeys));
  const [i, setI] = useState(0);
  const [done, setDone] = useState(false);
  const [picked, setPicked] = useState(null);
  const [locked, setLocked] = useState(false);
  const gainedRef = useRef(0);

  if (dueKeys.length === 0 && !done) {
    return (
      <div className="kw-fade" style={{ flex: 1, display: "flex", flexDirection: "column", padding: 16 }}>
        <TopBar title="修行の間" sub="Spaced Review" onBack={onBack} />
        <div className="kw-card" style={{ padding: 30, textAlign: "center", marginTop: 20 }}>
          <Shield size={32} color="var(--muted)" style={{ margin: "0 auto 10px" }} />
          <div className="kw-mincho" style={{ color: "var(--muted)" }}>今は復習すべき言霊がない。<br />クエストを進めて言葉を集めよう。</div>
        </div>
      </div>
    );
  }

  if (done || i >= queue.length) {
    return (
      <div className="kw-fade" style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", padding: 24, textAlign: "center" }}>
        <div className="kw-pop" style={{ fontSize: 60 }}>🧘</div>
        <div className="kw-brush kw-title-glint" style={{ fontSize: 30, marginTop: 8 }}>修行 完了</div>
        <div className="kw-mincho" style={{ color: "var(--muted)", marginTop: 12 }}>言霊が記憶に刻まれた。<br />MP が <span className="kw-num" style={{ color: "var(--mana)" }}>+{gainedRef.current}</span> 回復。</div>
        <button className="kw-btn kw-btn-gold" style={{ marginTop: 26, minWidth: 200 }} onClick={onBack}>拠点へ戻る</button>
      </div>
    );
  }

  const key = queue[i];
  const item = save.codex[key];
  // build a meaning MC from codex distractors
  const others = shuffle(Object.values(save.codex).filter(x => x.jp !== item.jp)).slice(0, 3).map(x => x.meaning);
  const choices = shuffle([item.meaning, ...others]).slice(0, 4);
  if (!choices.includes(item.meaning)) choices[0] = item.meaning;

  function answer(c) {
    setPicked(c); setLocked(true);
    const ok = c === item.meaning;
    const srs = { ...save.srs };
    const ease = ok ? (srs[key].ease || 0) + 1 : Math.max(0, (srs[key].ease || 0) - 1);
    const hours = ok ? Math.min(72, 8 * Math.pow(2, ease)) : 4;
    srs[key] = { ease, due: Date.now() + 1000 * 60 * 60 * hours };
    const codex = { ...save.codex };
    codex[key] = { ...item, mastery: clamp((item.mastery || 0) + (ok ? 1 : -1), 0, 5) };
    if (ok) gainedRef.current += 3;
    persist({ ...save, srs, codex, mp: clamp(save.mp + (ok ? 3 : 0), 0, save.maxMp) });
    setTimeout(() => { setPicked(null); setLocked(false); if (i + 1 >= queue.length) setDone(true); else setI(i + 1); }, 1000);
  }

  return (
    <div className="kw-fade" style={{ flex: 1, display: "flex", flexDirection: "column", padding: 16 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
        <button className="kw-tap" onClick={onBack} style={{ background: "none", border: "none", color: "var(--muted)", cursor: "pointer", display: "flex" }}><X size={22} /></button>
        <div className="kw-bar bar-mp" style={{ flex: 1 }}><i style={{ width: `${(i) / queue.length * 100}%` }} /></div>
        <span className="kw-num" style={{ fontSize: 12, color: "var(--muted)" }}>{i + 1}/{queue.length}</span>
      </div>
      <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
        <div className="kw-card" style={{ padding: "30px 20px", textAlign: "center" }}>
          <div className="kw-rune" style={{ fontSize: 46, fontWeight: 700 }}>{item.jp}</div>
          <button className="kw-btn kw-btn-mana" style={{ width: "auto", margin: "14px auto 0", padding: "8px 14px", fontSize: 13 }} onClick={() => speak(item.reading || item.jp)}>
            <Volume2 size={15} /> 聞く
          </button>
        </div>
        <div style={{ fontSize: 14, color: "var(--muted)", textAlign: "center", margin: "18px 0 12px" }}>この言霊の意味は？</div>
        <div style={{ display: "grid", gap: 10 }}>
          {choices.map((c, idx) => {
            const isAns = c === item.meaning;
            let cls = "kw-opt";
            if (locked) { if (isAns) cls += " good"; else if (picked === c) cls += " bad"; else cls += " dim"; }
            return (
              <button key={idx} className={cls} disabled={locked} onClick={() => answer(c)}>
                <span className="kw-optkey">{String.fromCharCode(65 + idx)}</span>
                <span style={{ flex: 1 }}>{c}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ----------------------- shared TopBar ----------------------- */
function TopBar({ title, sub, onBack }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
      <button className="kw-tap" onClick={onBack}
        style={{ width: 40, height: 40, borderRadius: 12, border: "1.5px solid var(--line)", background: "var(--panel)", color: "var(--ink)", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flex: "none" }}>
        <ChevronRight size={20} style={{ transform: "rotate(180deg)" }} />
      </button>
      <div>
        <div style={{ fontWeight: 700, fontSize: 19 }}>{title}</div>
        {sub && <div className="kw-mincho" style={{ fontSize: 12, color: "var(--muted)" }}>{sub}</div>}
      </div>
    </div>
  );
}


createRoot(document.getElementById("root")).render(<App />);

</script>
