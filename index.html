<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect, useRef } from "react";

import { Sparkles, Scroll, Flame, Crown, Heart, Coins, Volume2, Check, X, ChevronRight, BookOpen, Brain, Store, Lock, Trophy, RotateCcw, Star, Swords } from "lucide-react";

/* ===================== speech ===================== */
let JP_VOICE=null, TTS_UNLOCKED=false, VOICE_PREF=null;
const VOICE_KEY="kotodama:voice";
try{ VOICE_PREF=localStorage.getItem(VOICE_KEY)||null; }catch(e){}
function jaVoices(){
  try{
    const vs=window.speechSynthesis?.getVoices?.()||[];
    return vs.filter(v=>/ja[-_]?JP/i.test(v.lang)||/日本|Kyoko|Otoya|Hattori|Sayaka|Nanami/i.test(v.name));
  }catch(e){ return []; }
}
function pickVoice(){
  try{ const ja=jaVoices(); JP_VOICE=(VOICE_PREF&&ja.find(v=>v.voiceURI===VOICE_PREF||v.name===VOICE_PREF))||ja[0]||null; }catch(e){}
}
function setVoicePref(uri){
  VOICE_PREF=uri||null;
  try{ uri?localStorage.setItem(VOICE_KEY,uri):localStorage.removeItem(VOICE_KEY); }catch(e){}
  pickVoice();
}
function unlockTTS(){
  if(TTS_UNLOCKED)return;
  try{
    const s=window.speechSynthesis; if(!s)return;
    if(!JP_VOICE)pickVoice();
    const u=new SpeechSynthesisUtterance("\u3042"); u.volume=0; u.lang="ja-JP";
    if(JP_VOICE)u.voice=JP_VOICE; s.speak(u); TTS_UNLOCKED=true;
  }catch(e){}
}
if(typeof window!=="undefined"&&window.speechSynthesis){
  pickVoice();
  window.speechSynthesis.onvoiceschanged=pickVoice;
  window.addEventListener("pointerdown",unlockTTS,{passive:true});
  window.addEventListener("touchstart",unlockTTS,{passive:true});
}
function speak(text){
  try{
    const s=window.speechSynthesis; if(!s||!text)return;
    if(!JP_VOICE)pickVoice();
    TTS_UNLOCKED=true;
    if(s.paused)s.resume();
    s.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="ja-JP"; u.rate=0.88; u.pitch=1.0;
    if(JP_VOICE)u.voice=JP_VOICE; s.speak(u);
  }catch(e){}
}

/* ===================== storage ===================== */
const SAVE_KEY="kotodama:save:v2";
const mem={};
function loadSave(){ try{ const r=localStorage.getItem(SAVE_KEY); return r?JSON.parse(r):(mem[SAVE_KEY]||null); }catch(e){ return mem[SAVE_KEY]||null; } }
function writeSave(o){ mem[SAVE_KEY]=o; try{ localStorage.setItem(SAVE_KEY,JSON.stringify(o)); }catch(e){} }

function item(id){ return ITEMS.find(x=>x.id===id)||{}; }

/* card registry: id -> card */
const CARD_INDEX={};
CURRICULUM.forEach(L=>{ (L.quiz||[]).forEach((q,idx)=>{ const id=L.id+":"+idx; CARD_INDEX[id]={...q,_id:id,_lesson:L.id,_cefr:L.cefr}; }); });

/* ===================== helpers ===================== */
function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }
function shuffle(a){ const r=[...a]; for(let i=r.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [r[i],r[j]]=[r[j],r[i]]; } return r; }
function normKana(s){ return (s||"").replace(/\s/g,"").replace(/。/g,"").trim(); }
function xpToNext(lv){ return 40+lv*40; }
function maxHpOf(s){ return 80+s.lv*20; }
function atkOf(s){ return 8+s.lv*2+(item(s.equip.weapon).atk||0); }
function defOf(s){ return item(s.equip.armor).def||0; }
function gainXP(s,amt){ let lv=s.lv,xp=s.xp,ups=0; xp+=amt; while(xp>=xpToNext(lv)){ xp-=xpToNext(lv); lv++; ups++; } return {lv,xp,ups}; }

/* SM-2 lite scheduler */
const MIN=60000, HOUR=3600000, DAY=86400000;
const LEARN=[10];
function schedule(st,grade){
  const now=Date.now();
  st = st ? {...st} : { ease:2.5, ivl:0, due:0, reps:0, lapses:0, phase:"new", step:0 };
  if(st.phase==="new"){
    if(grade==="again"){ st.phase="learning"; st.step=0; st.due=now+1*MIN; }
    else { st.phase="learning"; st.step=0; st.due=now+LEARN[0]*MIN; }
  } else if(st.phase==="learning"){
    if(grade==="again"){ st.step=0; st.due=now+1*MIN; }
    else {
      const ns=st.step+1;
      if(ns>=LEARN.length){ st.phase="review"; st.ivl=1; st.reps+=1; st.due=now+DAY; st.step=0; }
      else { st.step=ns; st.due=now+LEARN[ns]*MIN; }
    }
  } else {
    if(grade==="again"){ st.lapses+=1; st.ease=Math.max(1.3,st.ease-0.2); st.phase="learning"; st.step=0; st.ivl=Math.max(1,Math.round(st.ivl*0.4)); st.due=now+1*MIN; }
    else if(grade==="hard"){ st.ease=Math.max(1.3,st.ease-0.15); st.ivl=Math.max(1,Math.round(st.ivl*1.2)); st.reps+=1; st.due=now+st.ivl*DAY; }
    else { st.ivl=Math.max(1,Math.round(st.ivl*st.ease)); st.reps+=1; st.due=now+st.ivl*DAY; }
  }
  return st;
}
function dueCards(s){
  const now=Date.now();
  return Object.keys(s.srs||{}).filter(id=>CARD_INDEX[id] && s.srs[id].due<=now+12*HOUR);
}
function sampleCards(lessonIds,n){
  const pool=Object.keys(CARD_INDEX).filter(id=>lessonIds.includes(CARD_INDEX[id]._lesson));
  return shuffle(pool).slice(0,n).map(id=>({...CARD_INDEX[id],_id:id}));
}
function nodeStatus(s){
  const st={}; let prevBossDone=true;
  for(const r of REGIONS){
    const nodes=CURRICULUM.filter(n=>n.region===r);
    const lessons=nodes.filter(n=>!n.boss);
    const boss=nodes.find(n=>n.boss);
    const regionUnlocked=prevBossDone;
    let prevDone=true;
    for(const n of lessons){
      const done=!!s.done[n.id];
      st[n.id]={done,locked:!regionUnlocked||!prevDone};
      prevDone=done;
    }
    if(boss){
      const allDone=lessons.every(n=>s.done[n.id]);
      st[boss.id]={done:!!s.done[boss.id],locked:!regionUnlocked||!allDone};
    }
    prevBossDone = boss ? !!s.done[boss.id] : prevDone;
  }
  return st;
}
function freshSave(){
  return { name:"転生者", lv:1, xp:0, gold:60, done:{}, srs:{}, codex:{},
    equip:{weapon:"w0",armor:"a0"}, owned:["w0","a0"], inv:{}, created:Date.now() };
}
function normalize(s){
  if(!s) return s;
  s.equip=s.equip||{}; if(!s.equip.weapon)s.equip.weapon="w0"; if(!s.equip.armor)s.equip.armor="a0";
  s.owned=Array.isArray(s.owned)?s.owned:[]; ["w0","a0"].forEach(id=>{ if(!s.owned.includes(id))s.owned.push(id); });
  s.inv=s.inv||{}; s.done=s.done||{}; s.srs=s.srs||{}; s.codex=s.codex||{};
  if(typeof s.gold!=="number")s.gold=0; if(typeof s.lv!=="number")s.lv=1; if(typeof s.xp!=="number")s.xp=0;
  return s;
}

/* ===================== Lesson ===================== */
function Lesson({node,update,onDone,onBack}){
  const cards=(node.quiz||[]).map((q,idx)=>({...q,_id:node.id+":"+idx}));
  const [phase,setPhase]=useState("teach");
  const [i,setI]=useState(0);
  const [k,setK]=useState(0);
  const right=useRef(0);
  const grades=useRef({});
  const [reward,setReward]=useState(null);

  function finish(){
    cards.forEach(c=>{ if(!grades.current[c._id]) grades.current[c._id]="good"; });
    update(s=>{
      const srs={...s.srs};
      cards.forEach(c=>{ srs[c._id]=schedule(srs[c._id],grades.current[c._id]); });
      const codex={...s.codex};
      (node.teach||[]).forEach(t=>{ codex[t.jp]={jp:t.jp,reading:t.reading||t.jp,meaning:t.meaning,cefr:node.cefr}; });
      const gold=right.current*8;
      const g=gainXP(s,cards.length*12);
      return {...s, srs, codex, done:{...s.done,[node.id]:true}, gold:s.gold+gold, lv:g.lv, xp:g.xp};
    });
    setReward({gold:right.current*8,xp:cards.length*12,right:right.current,total:cards.length});
    setPhase("done");
  }
  function onGrade(g){
    grades.current[cards[i]._id]=g;
    if(g!=="again")right.current+=1;
    if(i+1>=cards.length)finish();
    else { setI(i+1); setK(k+1); }
  }

  if(phase==="done"&&reward){
    const stars=Math.max(0,Math.round(reward.right/reward.total*3));
    return (
      <div className="wrap" style={{justifyContent:"center",alignItems:"center",padding:24,textAlign:"center"}}>
        <div className="pop" style={{fontSize:58}}>{node.reading?"📜":"✨"}</div>

        </div>

        <div className="card fade" style={{padding:18,marginBottom:14}}>

/* ===================== Boss ===================== */
function Boss({node,save,update,onWin,onBack}){
  const maxHp=maxHpOf(save), atk=atkOf(save), def=defOf(save);
  const enemyMax=node.enemy.hp;
  const power=Math.round(enemyMax/12)+8;
  const [cards]=useState(()=>sampleCards(node.sample,12));
  const [hp,setHp]=useState(maxHp);
  const [foe,setFoe]=useState(enemyMax);
  const [i,setI]=useState(0);
  const [k,setK]=useState(0);
  const [combo,setCombo]=useState(0);
  const [bag,setBag]=useState({...save.inv});
  const [shakeFoe,setShakeFoe]=useState(false);
  const [shakeHero,setShakeHero]=useState(false);
  const [fx,setFx]=useState(null);
  const [state,setState]=useState("fight");
  const wonRef=useRef(false);
  const card=cards[i];

  useEffect(()=>{ if(!fx)return; const t=setTimeout(()=>setFx(null),900); return ()=>clearTimeout(t); },[fx]);

  function srsUpdate(id,g){ update(s=>{ const srs={...s.srs}; srs[id]=schedule(srs[id],g); return {...s,srs}; }); }
  function win(){
    if(wonRef.current)return; wonRef.current=true;
    update(s=>{ const g=gainXP(s,60); return {...s, inv:bag, done:{...s.done,[node.id]:true}, gold:s.gold+enemyMax, lv:g.lv, xp:g.xp}; });
    setState("win");
  }
  function resolve(g){
    if(state!=="fight")return;
    srsUpdate(card._id,g);
    if(g!=="again"){
      const mult=g==="hard"?0.5:1;
      const dmg=Math.max(3,Math.round((atk+combo*2)*mult));
      const nf=Math.max(0,foe-dmg);
      setFoe(nf); setCombo(combo+1); setShakeFoe(true); setFx({d:dmg,who:"foe"});
      setTimeout(()=>setShakeFoe(false),350);
      if(nf<=0){ win(); return; }
    } else {
      const dmg=Math.max(2,power-def);
      const nh=Math.max(0,hp-dmg);
      setHp(nh); setCombo(0); setShakeHero(true); setFx({d:dmg,who:"hero"});
      setTimeout(()=>setShakeHero(false),350);
      if(nh<=0){ update(s=>({...s,inv:bag})); setState("lose"); return; }
    }
    if(i+1>=cards.length)setI(0); else setI(i+1);
    setK(k+1);
  }
  function usePotion(it){
    if((bag[it.id]||0)<=0||state!=="fight")return;
    setHp(clamp(hp+(it.heal||0),0,maxHp));
    setBag({...bag,[it.id]:(bag[it.id]||0)-1});
    setFx({d:it.heal,who:"heal"});
  }

  if(state==="win"){
    return (
      <div className="wrap" style={{justifyContent:"center",alignItems:"center",padding:24,textAlign:"center"}}>
        <div className="pop" style={{fontSize:62}}>{node.enemy.emoji}</div>
        <div className="brush glint" style={{fontSize:30,marginTop:6}}>領域突破！</div>
        <div className="mincho" style={{color:"var(--muted)",marginTop:8,lineHeight:1.7}}>{node.enemy.name} を倒した。<br/>新たな領域が開かれる。</div>
        <div className="card" style={{padding:16,marginTop:18,width:"100%",maxWidth:300}}>
          <Row icon={<Coins size={16} color="var(--gold)"/>} label="獲得ゴールド" val={"+"+enemyMax}/>
          <div style={{height:8}}/><Row icon={<Star size={16} color="var(--xp)"/>} label="経験値" val="+60"/>
        </div>
        <button className="btn" style={{marginTop:22,minWidth:220}} onClick={onWin}><Crown size={18}/> 拠点へ戻る</button>
      </div>
    );
  }
  if(state==="lose"){
    return (
      <div className="wrap" style={{justifyContent:"center",alignItems:"center",padding:24,textAlign:"center"}}>
        <div className="pop" style={{fontSize:54,opacity:.55}}>💫</div>
        <div className="brush" style={{fontSize:26,marginTop:8}}>力尽きた…</div>
        <div className="mincho" style={{color:"var(--muted)",marginTop:8,lineHeight:1.7}}>記憶の間で言葉を鍛え、<br/>装備を整えてから再挑戦しよう。</div>
        <div style={{display:"flex",gap:10,marginTop:22}}>
          <button className="btn btn-ghost" onClick={onBack}>拠点へ</button>
          <button className="btn" onClick={()=>{ setHp(maxHp); setFoe(enemyMax); setI(0); setK(k+1); setCombo(0); wonRef.current=false; setState("fight"); }}><RotateCcw size={16}/> 再挑戦</button>
        </div>
      </div>
    );
  }

  const ownedPotions=ITEMS.filter(it=>it.slot==="potion"&&(bag[it.id]||0)>0);
  return (
    <div className="wrap" style={{padding:16}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",display:"flex"}}><X size={22}/></button>
        <div style={{flex:1}}/>
        <span className="badge">{node.cefr} BOSS</span>
      </div>

      <div className={"card"+(shakeFoe?" shake":"")} style={{padding:16,marginBottom:10,position:"relative"}}>
        {fx&&fx.who==="foe"&&<div className="float" style={{right:24,top:8,color:"#ff9a6a"}}>-{fx.d}</div>}
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:42}}>{node.enemy.emoji}</div>
          <div style={{flex:1}}>
            <div className="brush" style={{fontSize:17}}>{node.enemy.name}</div>
            <div className="bar" style={{marginTop:6}}><i className="foef" style={{width:(foe/enemyMax*100)+"%"}}/></div>
          </div>
          <span style={{fontSize:12,color:"var(--muted)",fontWeight:700}}>{foe}/{enemyMax}</span>
        </div>
      </div>

      <div className={"card"+(shakeHero?" shake":"")} style={{padding:"10px 14px",marginBottom:14,position:"relative",display:"flex",alignItems:"center",gap:10}}>
        {fx&&fx.who==="hero"&&<div className="float" style={{left:24,top:4,color:"#ff5a5a"}}>-{fx.d}</div>}
        {fx&&fx.who==="heal"&&<div className="float" style={{left:24,top:4,color:"#6ad2b4"}}>+{fx.d}</div>}
        <Heart size={16} color="var(--hp)"/>
        <div className="bar" style={{flex:1}}><i className="hpf" style={{width:(hp/maxHp*100)+"%"}}/></div>
        <span style={{fontSize:12,color:"var(--muted)",fontWeight:700}}>{hp}/{maxHp}</span>
        {combo>1&&<span className="badge" style={{color:"var(--gold)"}}>{combo} COMBO</span>}
      </div>

      <Question key={k} card={card} onGrade={resolve}/>

      {ownedPotions.length>0&&<div style={{display:"flex",gap:8,justifyContent:"center",marginTop:16,flexWrap:"wrap"}}>
        {ownedPotions.map(it=>(
          <button key={it.id} className="btn btn-dark btn-sm" onClick={()=>usePotion(it)}>{it.emoji} {it.name}×{bag[it.id]}</button>
        ))}
      </div>}
    </div>
  );
}

/* ===================== Review (SRS / 記憶の間) ===================== */
function Review({save,update,onBack}){
  const [queue,setQueue]=useState(()=>shuffle(dueCards(save)));
  const [i,setI]=useState(0);
  const [k,setK]=useState(0);
  const [count,setCount]=useState(0);
  const [done,setDone]=useState(()=>dueCards(save).length===0);

  function onGrade(g){
    const id=queue[i];
    update(s=>{ const srs={...s.srs}; srs[id]=schedule(srs[id],g); return {...s,srs}; });
    setCount(count+1);
    let q=queue;
    if(g==="again"){ q=[...queue,id]; setQueue(q); }
    if(i+1>=q.length)setDone(true); else { setI(i+1); setK(k+1); }
  }

  if(done){
    return (
      <div className="wrap" style={{justifyContent:"center",alignItems:"center",padding:24,textAlign:"center"}}>
        <div className="pop" style={{fontSize:56}}>🧘</div>
        <div className="brush glint" style={{fontSize:28,marginTop:8}}>{count>0?"修行 完了":"今は静寂"}</div>
        {count>0
          ? <div className="mincho" style={{color:"var(--muted)",marginTop:10,lineHeight:1.7}}>{count} 個の言霊を呼び起こした。<br/>記憶に刻まれていく。</div>
          : <div className="mincho" style={{color:"var(--muted)",marginTop:10,lineHeight:1.7}}>今、思い出すべき言霊はない。<br/>クエストを進めて言葉を集めよう。</div>}
        <button className="btn" style={{marginTop:22,minWidth:200}} onClick={onBack}>拠点へ戻る</button>
      </div>
    );
  }

  const remain=queue.length-i;
  const id=queue[i];
  const card={...CARD_INDEX[id],_id:id};
  return (
    <div className="wrap" style={{padding:16}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",display:"flex"}}><X size={22}/></button>
        <div style={{flex:1,textAlign:"center"}}><span className="eyebrow">記憶の間</span></div>
        <span style={{fontSize:12,color:"var(--muted)",fontWeight:700}}>残り {remain}</span>
      </div>
      <div className="bar" style={{marginBottom:16}}><i className="xpf" style={{width:Math.min(100,count/(count+remain)*100)+"%"}}/></div>
      <Question key={k} card={card} onGrade={onGrade}/>
    </div>
  );
}

/* ===================== Shop ===================== */
function Shop({save,update,onBack}){
  const [tab,setTab]=useState("weapon");
  const list=ITEMS.filter(it=>it.slot===tab);
  const tabs=[["weapon","武器"],["armor","防具"],["potion","道具"]];
  function buyGear(it){
    if(save.owned.includes(it.id)||save.gold<it.cost)return;
    update(s=>({...s, gold:s.gold-it.cost, owned:[...s.owned,it.id], equip:{...s.equip,[it.slot]:it.id}}));
  }
  function equip(it){ update(s=>({...s,equip:{...s.equip,[it.slot]:it.id}})); }
  function buyPotion(it){ if(save.gold<it.cost)return; update(s=>({...s, gold:s.gold-it.cost, inv:{...s.inv,[it.id]:(s.inv[it.id]||0)+1}})); }
  return (
    <div className="wrap" style={{padding:16}}>
      <TopBar title="言ノ葉商店" sub="Shop" onBack={onBack}/>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:14}}>
        <Coins size={16} color="var(--gold)"/><span style={{fontWeight:800,color:"var(--gold)"}}>{save.gold}</span><span style={{color:"var(--muted)",fontSize:13}}>G</span>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {tabs.map(([id,label])=>(
          <button key={id} className={tab===id?"btn":"btn btn-dark"} style={{flex:1,padding:"9px 0",fontSize:14}} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>
      <div style={{display:"grid",gap:10}}>
        {list.map(it=>{
          const owned=save.owned.includes(it.id);
          const equipped=save.equip[it.slot]===it.id;
          const cnt=save.inv[it.id]||0;
          return (
            <div key={it.id} className="card" style={{padding:14}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{fontSize:30}}>{it.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15}}>{it.name} {it.slot==="potion"&&cnt>0&&<span style={{color:"var(--muted)",fontSize:12}}>×{cnt}</span>}</div>
                  <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.5,marginTop:2}}>{it.desc}</div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:10}}>
                <span style={{fontSize:13,color:"var(--gold)",fontWeight:700}}>{it.cost===0?"無料":it.cost+" G"}</span>
                {it.slot==="potion"
                  ? <button className="btn btn-sm" disabled={save.gold<it.cost} onClick={()=>buyPotion(it)}>購入</button>
                  : equipped ? <span className="badge" style={{color:"var(--good)"}}>装備中</span>
                  : owned ? <button className="btn btn-dark btn-sm" onClick={()=>equip(it)}>装備</button>
                  : <button className="btn btn-sm" disabled={save.gold<it.cost} onClick={()=>buyGear(it)}>購入</button>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ===================== App ===================== */
function App(){
  const [save,setSave]=useState(null);
  const [loaded,setLoaded]=useState(false);
  const [view,setView]=useState("title");
  const [node,setNode]=useState(null);

  useEffect(()=>{ const s=loadSave(); setSave(normalize(s)); setLoaded(true); },[]);
  function persist(s){ const n=normalize(s); setSave(n); writeSave(n); }
  function update(mut){ setSave(prev=>{ const n=normalize(mut(prev)); writeSave(n); return n; }); }

  if(!loaded) return <div className="wrap" style={{justifyContent:"center",alignItems:"center"}}><div className="brush glint" style={{fontSize:24}}>言ノ葉世界</div></div>;

  if(!save||view==="title"){
    const has=!!save&&Object.keys(save.done||{}).length>0;
    return (
      <div className="wrap" style={{justifyContent:"center",alignItems:"center",padding:28,textAlign:"center"}}>
        <div className="pop" style={{fontSize:54}}>📖</div>
        <div className="brush glint" style={{fontSize:38,marginTop:10,lineHeight:1.2}}>言ノ葉世界</div>
        <div className="eyebrow" style={{marginTop:8}}>Kotodama RPG · 日本語の異世界</div>
        <div className="mincho" style={{fontSize:13.5,color:"var(--muted)",marginTop:18,lineHeight:1.8,maxWidth:300}}>言葉を集め、忘れる前に思い出し、言霊の力で異世界を旅する。<br/>P0 音ノ章 から B1 冒険者の谷 まで。</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:26,width:"100%",maxWidth:260}}>
          {has&&<button className="btn" onClick={()=>{ if(!save)persist(freshSave()); setView("hub"); }}><ChevronRight size={18}/> 続きから</button>}
          <button className={has?"btn btn-dark":"btn"} onClick={()=>{ persist(freshSave()); setView("hub"); }}>{has?"最初から":"はじめる"}</button>
        </div>
      </div>
    );
  }

  if(view==="lesson"&&node) return <Lesson node={node} update={update} onBack={()=>setView("hub")} onDone={()=>setView("hub")}/>;
  if(view==="boss"&&node) return <Boss node={node} save={save} update={update} onBack={()=>setView("hub")} onWin={()=>setView("hub")}/>;
  if(view==="review") return <Review save={save} update={update} onBack={()=>setView("hub")}/>;
  if(view==="shop") return <Shop save={save} update={update} onBack={()=>setView("hub")}/>;
  if(view==="codex") return <Codex save={save} onBack={()=>setView("hub")}/>;

  const due=dueCards(save).length;
  const xpNext=xpToNext(save.lv);
  return (
    <div className="wrap">
      <div style={{padding:"16px 16px 0"}}>
        <div className="card" style={{padding:14}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:44,height:44,borderRadius:12,background:"var(--panel2)",border:"1px solid var(--line)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flex:"none"}}>🧙</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span className="brush" style={{fontSize:16}}>{save.name}</span>
                <span className="badge">Lv.{save.lv}</span>
              </div>
              <div className="bar" style={{marginTop:6}}><i className="xpf" style={{width:(save.xp/xpNext*100)+"%"}}/></div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5,flex:"none"}}><Coins size={15} color="var(--gold)"/><span style={{fontWeight:800,color:"var(--gold)",fontSize:14}}>{save.gold}</span></div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:12}}>
          <button className="card" onClick={()=>setView("review")} style={{padding:"14px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer",position:"relative",border:due>0?"1px solid rgba(240,82,79,.5)":"1px solid var(--line)"}}>
            {due>0&&<span className="dot">{due}</span>}
            <Brain size={22} color={due>0?"var(--hp)":"var(--mana)"}/><span style={{fontSize:12,fontWeight:700}}>記憶の間</span>
          </button>
          <button className="card" onClick={()=>setView("shop")} style={{padding:"14px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer"}}>
            <Store size={22} color="var(--gold)"/><span style={{fontSize:12,fontWeight:700}}>商店</span>
          </button>
          <button className="card" onClick={()=>setView("codex")} style={{padding:"14px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer"}}>
            <BookOpen size={22} color="var(--xp)"/><span style={{fontSize:12,fontWeight:700}}>言ノ葉帳</span>
          </button>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",marginTop:14}}>
        <MapView save={save} onPick={(n)=>{ setNode(n); setView(n.boss?"boss":"lesson"); }}/>
      </div>
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
