/* ===================== speech ===================== */
let JP_VOICE=null, TTS_UNLOCKED=false, VOICE_PREF=null;
const VOICE_KEY="kotodama:voice";
try{ VOICE_PREF=localStorage.getItem(VOICE_KEY)||null; }catch(e){}
function jaVoices(){
  try{
    const vs=window.speechSynthesis?.getVoices?.()||[];
    return vs.filter(v=>/ja[-_]?JP/i.test(v.lang)||/日本|Kyoko|Otoya|Hattori|Sayaka|Nanami/i.test(v.name));
  }catch(e){ return []; }
}
function pickVoice(){
  try{ const ja=jaVoices(); JP_VOICE=(VOICE_PREF&&ja.find(v=>v.voiceURI===VOICE_PREF||v.name===VOICE_PREF))||ja[0]||null; }catch(e){}
}
function unlockTTS(){
  if(TTS_UNLOCKED)return;
  try{
    const s=window.speechSynthesis; if(!s)return;
    if(!JP_VOICE)pickVoice();
    const u=new SpeechSynthesisUtterance("\u3042"); u.volume=0; u.lang="ja-JP";
    if(JP_VOICE)u.voice=JP_VOICE; s.speak(u); TTS_UNLOCKED=true;
  }catch(e){}
}
if(typeof window!=="undefined"&&window.speechSynthesis){
  pickVoice();
  window.speechSynthesis.onvoiceschanged=pickVoice;
  window.addEventListener("pointerdown",unlockTTS,{passive:true});
  window.addEventListener("touchstart",unlockTTS,{passive:true});
}
function speak(text){
  try{
    const s=window.speechSynthesis; if(!s||!text)return;
    if(!JP_VOICE)pickVoice();
    TTS_UNLOCKED=true;
    if(s.paused)s.resume();
    s.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="ja-JP"; u.rate=0.88; u.pitch=1.0;
    if(JP_VOICE)u.voice=JP_VOICE; s.speak(u);
  }catch(e){}
}

  if(node.event){ const g=node.affGate; const v=(s.aff&&s.aff[g.key])||0; return v<g.val?{locked:true,reason:"好感度 "+AFF[g.key].label+" "+g.val}:{locked:false}; }
  if(node.minLv && (s.lv||1)<node.minLv) return {locked:true,reason:"Lv."+node.minLv+" で解放"};
  return {locked:false};
}

const CARD_INDEX={};
SCENES.forEach(L=>{ (L.quiz||[]).forEach((q,idx)=>{ const id=L.id+":"+idx; CARD_INDEX[id]={...q,_id:id,_lesson:L.id,_cefr:L.cefr}; }); });

/* ===================== helpers ===================== */
function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }
function shuffle(a){ const r=[...a]; for(let i=r.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [r[i],r[j]]=[r[j],r[i]]; } return r; }
function normKana(s){ return (s||"").replace(/\s/g,"").replace(/。/g,"").trim(); }
function xpToNext(lv){ return 40+lv*40; }
function gainXP(s,amt){ let lv=s.lv,xp=s.xp,ups=0; xp+=amt; while(xp>=xpToNext(lv)){ xp-=xpToNext(lv); lv++; ups++; } return {lv,xp,ups}; }
function sceneById(id){ return SCENES.find(s=>s.id===id); }

/* SM-2 lite scheduler */
const MIN=60000, HOUR=3600000, DAY=86400000;
const LEARN=[10];
function schedule(st,grade){
  const now=Date.now();
  st = st ? {...st} : { ease:2.5, ivl:0, due:0, reps:0, lapses:0, phase:"new", step:0 };
  if(st.phase==="new"){
    if(grade==="again"){ st.phase="learning"; st.step=0; st.due=now+1*MIN; }
    else { st.phase="learning"; st.step=0; st.due=now+LEARN[0]*MIN; }
  } else if(st.phase==="learning"){
    if(grade==="again"){ st.step=0; st.due=now+1*MIN; }
    else {
      const ns=st.step+1;
      if(ns>=LEARN.length){ st.phase="review"; st.ivl=1; st.reps+=1; st.due=now+DAY; st.step=0; }
      else { st.step=ns; st.due=now+LEARN[ns]*MIN; }
    }
  } else {
    if(grade==="again"){ st.lapses+=1; st.ease=Math.max(1.3,st.ease-0.2); st.phase="learning"; st.step=0; st.ivl=Math.max(1,Math.round(st.ivl*0.4)); st.due=now+1*MIN; }
    else if(grade==="hard"){ st.ease=Math.max(1.3,st.ease-0.15); st.ivl=Math.max(1,Math.round(st.ivl*1.2)); st.reps+=1; st.due=now+st.ivl*DAY; }
    else { st.ivl=Math.max(1,Math.round(st.ivl*st.ease)); st.reps+=1; st.due=now+st.ivl*DAY; }
  }
  return st;
}
function dueCards(s){
  const now=Date.now();
  return Object.keys(s.srs||{}).filter(id=>CARD_INDEX[id] && s.srs[id].due<=now+12*HOUR);
}
function sampleCards(lessonIds,n){
  const pool=Object.keys(CARD_INDEX).filter(id=>lessonIds.includes(CARD_INDEX[id]._lesson));
  return shuffle(pool).slice(0,n).map(id=>({...CARD_INDEX[id],_id:id}));
}
function freshSave(){
  return { name:"あなた", lv:1, xp:0, gold:60, dayIdx:0, slot:0, energy:100, seenJob:false, showJob:false,
    done:{}, srs:{}, codex:{}, aff:{}, inv:{}, created:Date.now() };
}
function normalize(s){
  if(!s) return s;
  s.done=s.done||{}; s.srs=s.srs||{}; s.codex=s.codex||{}; s.aff=s.aff||{}; s.inv=s.inv||{};
  if(typeof s.gold!=="number")s.gold=0; if(typeof s.lv!=="number")s.lv=1; if(typeof s.xp!=="number")s.xp=0;
  if(typeof s.dayIdx!=="number")s.dayIdx=(typeof s.day==="number"?s.day-1:0); if(s.dayIdx<0)s.dayIdx=0;
  if(typeof s.slot!=="number")s.slot=0;
  if(typeof s.energy!=="number")s.energy=100;
  if(typeof s.seenJob!=="boolean")s.seenJob=false;
  if(typeof s.showJob!=="boolean")s.showJob=false;
  if(!s.name)s.name="あなた";
  return s;
}

/* ===================== Question (universal) ===================== */
function Question({card,onGrade}){
  const k=card.kind;
  const [done,setDone]=useState(false);
  const [ok,setOk]=useState(null);
  const [picked,setPicked]=useState(null);
  const [dim,setDim]=useState([]);
  const [hintUsed,setHintUsed]=useState(false);
  const [chosen,setChosen]=useState([]);
  const [typed,setTyped]=useState("");
  const [choices]=useState(()=> (k==="mc"||k==="cloze")?shuffle(card.choices||[]):[]);
  const [pool]=useState(()=> k==="build"?shuffle((card.pool||[]).map((w,i)=>({w,i}))):[]);

  function grade(){ onGrade(ok?(hintUsed?"hard":"good"):"again"); }
  function useHint(){
    if(hintUsed||done)return;
    const wrong=choices.map((c,i)=>i).filter(i=>choices[i]!==card.answer&&!dim.includes(i));
    if(wrong.length){ setDim([...dim,wrong[(Math.random()*wrong.length)|0]]); setHintUsed(true); }
  }

  if(k==="mc"||k==="cloze"){
    return (
      <div className="fade">
        <div className="card" style={{padding:18,marginBottom:14}}>
          <div className="mincho" style={{fontSize:18,lineHeight:1.7}}>{card.prompt}</div>
        </div>
        <div style={{display:"grid",gap:10}}>
          {choices.map((c,idx)=>{
            const isAns=c===card.answer; let cls="opt";
            if(done){ if(isAns)cls+=" good"; else if(picked===c)cls+=" bad"; else cls+=" dim"; }
            else if(dim.includes(idx))cls+=" dim";
            return (
              <button key={idx} className={cls} disabled={done||dim.includes(idx)} onClick={()=>{ if(done)return; setPicked(c); setOk(c===card.answer); setDone(true); }}>
                <span className="optkey">{String.fromCharCode(65+idx)}</span>
                <span style={{flex:1}}>{c}</span>
                {done&&isAns&&<Check size={18} color="var(--good)"/>}
              </button>
            );
          })}
        </div>
        <Footer done={done} ok={ok} onNext={grade} onHint={!done?useHint:null} hintUsed={hintUsed}/>
      </div>
    );
  }

  if(k==="find_error"){
    return (
      <div className="fade">
        <div className="card" style={{padding:18,marginBottom:8}}>
          <div className="eyebrow" style={{marginBottom:10}}>誤りを探せ</div>
          <div className="mincho" style={{fontSize:15,color:"var(--muted)",marginBottom:12}}>{card.prompt}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
            {card.parts.map((p,idx)=>{
              let cls="tok"; if(done&&idx===card.wrongIndex)cls+=" err";
              return <button key={idx} className={cls} disabled={done} onClick={()=>{ if(done)return; setPicked(idx); setOk(idx===card.wrongIndex); setDone(true); }}>{p}</button>;
            })}
          </div>
        </div>
        {done&&<div className="card pop" style={{padding:14,marginBottom:8}}>
          <div style={{fontSize:14,color:ok?"var(--good)":"var(--bad)",fontWeight:700,marginBottom:6}}>{ok?"正解！":"惜しい…"}</div>
          <div className="mincho" style={{fontSize:14,lineHeight:1.6}}>{card.explain}</div>
        </div>}
        <Footer done={done} ok={ok} onNext={grade}/>
      </div>
    );
  }

  if(k==="build"){
    const usedIdx=chosen.map(c=>c.i);
    function check(){ const got=chosen.map(c=>c.w).join("\u0001"); const want=card.target.join("\u0001"); setOk(got===want); setDone(true); }
    return (
      <div className="fade">
        <div className="card" style={{padding:18,marginBottom:12}}>
          <div className="mincho" style={{fontSize:16,lineHeight:1.7}}>{card.prompt}</div>
        </div>
        <div style={{minHeight:54,display:"flex",flexWrap:"wrap",gap:8,padding:12,border:"1.5px dashed var(--line)",borderRadius:12,marginBottom:12,background:"#0e0b1a"}}>
          {chosen.length===0&&<span style={{color:"var(--muted)",fontSize:13,alignSelf:"center"}}>下から語を選んで並べる</span>}
          {chosen.map((c,n)=>{
            let cls="tok"; if(done)cls+=(c.w===(card.target[n]||"")?" ok":" err");
            return <button key={n} className={cls} disabled={done} onClick={()=>setChosen(chosen.filter((_,m)=>m!==n))}>{c.w}</button>;
          })}
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
          {pool.map((t,idx)=>(
            <button key={idx} className={"tok"+(usedIdx.includes(t.i)?" used":"")} disabled={done||usedIdx.includes(t.i)} onClick={()=>setChosen([...chosen,t])}>{t.w}</button>
          ))}
        </div>
        {!done&&<div style={{display:"flex",justifyContent:"center",marginTop:16}}>
          <button className="btn" disabled={chosen.length!==card.target.length} onClick={check}><Check size={16}/> 確認</button>
        </div>}
        {done&&!ok&&<div className="card pop" style={{padding:12,marginTop:12,textAlign:"center"}}>
          <div className="eyebrow" style={{marginBottom:4}}>正しい並び</div>
          <div className="brush" style={{fontSize:18}}>{card.target.join(" ")}</div>
        </div>}
        <Footer done={done} ok={ok} onNext={grade}/>
      </div>
    );
  }

  if(k==="dictation"){
    function check(){ setOk(card.accept.map(normKana).includes(normKana(typed))); setDone(true); }
    return (
      <div className="fade">
        <div className="card" style={{padding:22,marginBottom:14,textAlign:"center"}}>
          <div className="eyebrow" style={{marginBottom:12}}>聞いて書き取る</div>
          <button className="btn" onClick={()=>speak(card.jp)} style={{margin:"0 auto"}}><Volume2 size={18}/> 音を聞く</button>
          {card.hint&&<div style={{fontSize:12,color:"var(--muted)",marginTop:12}}>ヒント：{card.hint}</div>}
        </div>
        <input className="field" value={typed} onChange={e=>setTyped(e.target.value)} placeholder="かなで入力" disabled={done} autoCapitalize="off" autoCorrect="off" spellCheck={false} style={{textAlign:"center"}}/>
        {!done&&<div style={{display:"flex",justifyContent:"center",marginTop:16}}>
          <button className="btn" disabled={!typed.trim()} onClick={check}><Check size={16}/> 確認</button>
        </div>}
        {done&&<div className="card pop" style={{padding:14,marginTop:12,textAlign:"center"}}>
          <div style={{fontSize:14,color:ok?"var(--good)":"var(--bad)",fontWeight:700}}>{ok?"正解！":"正しくは"}</div>
          {!ok&&<div className="brush" style={{fontSize:24,marginTop:6}}>{card.accept[0]}</div>}
        </div>}
        <Footer done={done} ok={ok} onNext={grade}/>
      </div>
    );
  }

  if(k==="translate"){
    return (
      <div className="fade">
        <div className="card" style={{padding:18,marginBottom:14}}>
          <div className="eyebrow" style={{marginBottom:8}}>日本語にする</div>
          <div style={{fontSize:17,lineHeight:1.6}}>{card.prompt}</div>
        </div>
        <input className="field" value={typed} onChange={e=>setTyped(e.target.value)} placeholder="日本語で書いてみる" disabled={done} style={{textAlign:"center"}}/>
        {!done&&<div style={{display:"flex",justifyContent:"center",marginTop:16}}>
          <button className="btn" onClick={()=>setDone(true)}>答え合わせ</button>
        </div>}
        {done&&<>
          <div className="card pop" style={{padding:16,marginTop:14}}>
            <div className="eyebrow" style={{marginBottom:6}}>模範解答</div>
            <div className="brush" style={{fontSize:20,marginBottom:4}}>{card.model}</div>
            <button className="btn btn-dark btn-sm" onClick={()=>speak(card.model)} style={{margin:"4px 0 10px"}}><Volume2 size={14}/> 聞く</button>
            {card.notes&&<div className="mincho" style={{fontSize:13,color:"var(--muted)",lineHeight:1.6}}>{card.notes}</div>}
          </div>
          <div style={{fontSize:13,color:"var(--muted)",textAlign:"center",margin:"14px 0 8px"}}>模範解答と比べて、自分で判定：</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <button className="opt" style={{justifyContent:"center",fontSize:14}} onClick={()=>onGrade("good")}>できた</button>
            <button className="opt" style={{justifyContent:"center",fontSize:14}} onClick={()=>onGrade("hard")}>おしい</button>
            <button className="opt" style={{justifyContent:"center",fontSize:14}} onClick={()=>onGrade("again")}>まだ</button>
          </div>
        </>}
      </div>
    );
  }

  if(k==="shadow"){
    return (
      <div className="fade">
        <div className="card" style={{padding:24,marginBottom:14,textAlign:"center"}}>
          <div className="eyebrow" style={{marginBottom:14}}>聞いて、まねて声に出す</div>
          <div className="brush" style={{fontSize:30,marginBottom:6}}>{card.jp}</div>
          <div className="mincho" style={{fontSize:14,color:"var(--muted)",marginBottom:16}}>{card.meaning}</div>
          <button className="btn" onClick={()=>speak(card.jp)} style={{margin:"0 auto"}}><Volume2 size={18}/> 聞く</button>
        </div>
        <div style={{fontSize:13,color:"var(--muted)",textAlign:"center",marginBottom:8}}>声に出して言えたら：</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <button className="opt" style={{justifyContent:"center"}} onClick={()=>onGrade("good")}>言えた</button>
          <button className="opt" style={{justifyContent:"center"}} onClick={()=>onGrade("again")}>もう一度</button>
        </div>
      </div>
    );
  }

  return null;
}
function Footer({done,ok,onNext,onHint,hintUsed}){
  return (
    <div style={{marginTop:18}}>
      {!done&&onHint&&<div style={{textAlign:"center",marginBottom:10}}>
        <button className="btn btn-dark btn-sm" onClick={onHint} disabled={hintUsed}><Star size={14}/> ヒント（1つ消す）</button>
      </div>}
      {done&&<button className="btn" style={{width:"100%"}} onClick={onNext}>
        {ok?"正解！ ":"次へ "}<ChevronRight size={18}/>
      </button>}
    </div>
  );
}

/* ===================== Scene (lesson/event) ===================== */
function Scene({node,save,update,onDone,onBack}){
  const [cards]=useState(()=> node.event ? sampleCards(node.sample,10) : (node.quiz||[]).map((q,idx)=>({...q,_id:node.id+":"+idx})) );
  const [phase,setPhase]=useState("teach");
  const [i,setI]=useState(0);
  const [k,setK]=useState(0);
  const right=useRef(0);
  const grades=useRef({});
  const [reward,setReward]=useState(null);
  const tired=(save.energy||0)>0?1:0.5;

  function finish(){
    cards.forEach(c=>{ if(!grades.current[c._id]) grades.current[c._id]="good"; });
    const replay=!!(save.done && save.done[node.id] && !node.event);
    const factor=replay?0.5:1;
    const gold=Math.round(right.current*8*tired*factor)+(node.event?40:0);
    const xpAmt=Math.round((cards.length*20+40)*tired*factor);
    update(s=>{
      const srs={...s.srs};
      cards.forEach(c=>{ srs[c._id]=schedule(srs[c._id],grades.current[c._id]); });
      const codex={...s.codex};
      (node.teach||[]).forEach(t=>{ codex[t.jp]={jp:t.jp,reading:t.reading||t.jp,meaning:t.meaning,cefr:node.cefr}; });
      const aff={...(s.aff||{})};
      (node.aff||[]).forEach(key=>{ aff[key]=clamp((aff[key]||0)+20,0,100); });
      const g=gainXP(s,xpAmt);
      const energy=clamp((s.energy||0)-(node.cost||25),0,100);
      const slot=((s.slot||0)+1);
      return {...s, srs, codex, aff, energy, slot, done:{...s.done,[node.id]:true}, gold:s.gold+gold, lv:g.lv, xp:g.xp};
    });
    setReward({gold,xp:xpAmt,right:right.current,total:cards.length});
    setPhase("done");
  }
  function onGrade(g){
    grades.current[cards[i]._id]=g;
    if(g!=="again")right.current+=1;
    if(i+1>=cards.length)finish();
    else { setI(i+1); setK(k+1); }
  }

  if(phase==="done"&&reward){
    const stars=Math.max(0,Math.round(reward.right/Math.max(1,reward.total)*3));
    return (
      <div className="wrap" style={{justifyContent:"center",alignItems:"center",padding:24,textAlign:"center"}}>
        <div className="pop" style={{fontSize:58}}>{DOMAIN_EMOJI[node.domain]||"\u2728"}</div>
        <div className="brush glint" style={{fontSize:28,marginTop:8}}>一場面、クリア</div>
        <div className="mincho" style={{color:"var(--muted)",marginTop:6}}>{node.title}</div>
        <div style={{marginTop:14,fontSize:24,letterSpacing:4}}>
          {[0,1,2].map(n=><span key={n} style={{color:n<stars?"var(--gold)":"var(--line)"}}>★</span>)}
        </div>
        <div className="card" style={{padding:16,marginTop:18,width:"100%",maxWidth:300}}>
          <Row icon={<Check size={16} color="var(--good)"/>} label="正解" val={reward.right+" / "+reward.total}/>
          <div style={{height:8}}/>
          <Row icon={<Coins size={16} color="var(--gold)"/>} label="お金" val={"+"+reward.gold}/>
          <div style={{height:8}}/>
          <Row icon={<Star size={16} color="var(--xp)"/>} label="経験値" val={"+"+reward.xp}/>
          {(node.aff||[]).length>0&&<><div style={{height:8}}/>
            <Row icon={<Heart size={16} color="var(--aff)"/>} label="好感度" val={node.aff.map(a=>AFF[a].label).join("・")+" +20"}/></>}
        </div>
        {tired<1&&<div style={{fontSize:12,color:"var(--hp)",marginTop:10}}>※ 体力切れで報酬が半分に。休んでから挑もう。</div>}
        <div className="card" style={{padding:12,marginTop:14,width:"100%",maxWidth:300,background:"var(--panel2)"}}>
          <div style={{fontSize:12.5,color:"var(--muted)",lineHeight:1.6}}>覚えた言葉は<b style={{color:"var(--ink)"}}>復習（思い出す部屋）</b>に届く。忘れかけた頃に出てくるので、毎日のぞくと定着する。</div>
        </div>
        <button className="btn" style={{marginTop:20,minWidth:220}} onClick={onDone}><Calendar size={18}/> 予定表へ戻る</button>
      </div>
    );
  }

  if(phase==="teach"){
    return (
      <div className="wrap" style={{padding:16}}>
        <TopBar title={node.title} sub={node.sub} onBack={onBack}/>
        <div className="card fade" style={{padding:18,marginBottom:14}}>
          <div className="eyebrow" style={{marginBottom:8,display:"flex",gap:8,alignItems:"center"}}>
            <span>{DOMAIN_EMOJI[node.domain]} {node.cefr} · {node.stage}</span>
            {node.contact&&<span className="badge" style={{color:"var(--aff)"}}>上級接觸・認識のみ</span>}
          </div>
          <div className="mincho" style={{fontSize:14.5,lineHeight:1.8,color:"var(--ink)"}}>{node.setting}</div>
        </div>
        {(() => { const g=node.grammar||GRAMMAR[node.id]; if(!g)return null; return (
          <div className="card fade" style={{padding:16,marginBottom:14,border:"1px solid rgba(232,198,107,.45)",background:"linear-gradient(180deg,rgba(232,198,107,.08),var(--bg2))"}}>
            <div className="eyebrow" style={{marginBottom:8,color:"var(--gold)"}}>📌 今日の文型</div>
            <div className="brush" style={{fontSize:20}}>{g.point}</div>
            <div className="mincho" style={{fontSize:13,color:"var(--muted)",marginTop:4}}>{g.gloss}</div>
            {g.example&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid var(--line)",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
              <span className="mincho" style={{fontSize:15}}>{g.example}</span>
              <button className="btn-dark" onClick={()=>speak(g.example)} style={{width:32,height:32,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid var(--line)",cursor:"pointer",flex:"none"}}><Volume2 size={14}/></button>
            </div>}
          </div>
        ); })()}
        {node.reading&&node.passage&&(
          <div className="card fade" style={{padding:18,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div className="eyebrow">本文</div>
              <Listen text={node.passage} label="読み上げ"/>
            </div>
            <div className="mincho" style={{fontSize:16,lineHeight:2}}>{node.passage}</div>
            {node.gloss&&<div style={{marginTop:14,paddingTop:12,borderTop:"1px solid var(--line)",display:"grid",gap:6}}>
              {node.gloss.map((g,n)=><div key={n} style={{display:"flex",justifyContent:"space-between",fontSize:13,gap:10}}><span className="mincho">{g.jp}</span><span style={{color:"var(--muted)",textAlign:"right"}}>{g.meaning}</span></div>)}
            </div>}
          </div>
        )}
        {(node.teach||[]).length>0&&<div className="fade" style={{display:"grid",gap:8,marginBottom:16}}>
          {node.teach.map((t,n)=>(
            <div key={n} className="card" style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
              <div style={{flex:1,minWidth:0}}>
                <div className="brush" style={{fontSize:18}}>{t.jp}</div>
                {t.reading&&t.reading!==t.jp&&<div style={{fontSize:11,color:"var(--muted)"}}>{t.reading}</div>}
              </div>
              <div className="mincho" style={{fontSize:13,color:"var(--muted)",textAlign:"right",maxWidth:160}}>{t.meaning}</div>
              <button className="btn-dark" onClick={()=>speak(t.reading||t.jp)} style={{width:34,height:34,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid var(--line)",cursor:"pointer",flex:"none"}}><Volume2 size={15}/></button>
            </div>
          ))}
        </div>}
        {node.event&&<div className="card fade" style={{padding:14,marginBottom:14,background:"var(--panel2)"}}>
          <div style={{fontSize:13,color:"var(--muted)",lineHeight:1.6}}>このイベントは、これまでの場面から言葉をランダムに呼び出す<b style={{color:"var(--ink)"}}>振り返り</b>。記憶を交ぜて思い出すと、定着が強くなる。</div>
        </div>}
        <button className="btn" style={{width:"100%"}} onClick={()=>setPhase("quiz")}>{node.reading?"読解に挑む":"場面を始める"}（{cards.length}問）<ChevronRight size={18}/></button>
      </div>
    );
  }

  return (
    <div className="wrap" style={{padding:16}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",display:"flex"}}><X size={22}/></button>
        <div className="bar" style={{flex:1}}><i className="xpf" style={{width:(i/cards.length*100)+"%"}}/></div>
        <span style={{fontSize:12,color:"var(--muted)",fontWeight:700}}>{i+1}/{cards.length}</span>
      </div>
      <Question key={k} card={cards[i]} onGrade={onGrade}/>
    </div>
  );
}

/* ===================== Review (SRS) ===================== */
function Review({save,update,onBack}){
  const [queue,setQueue]=useState(()=>shuffle(dueCards(save)));
  const [i,setI]=useState(0);
  const [k,setK]=useState(0);
  const [count,setCount]=useState(0);
  const [done,setDone]=useState(()=>dueCards(save).length===0);

  function onGrade(g){
    const id=queue[i];
    update(s=>{
      const srs={...s.srs}; srs[id]=schedule(srs[id],g);
      const gx=g!=="again"?gainXP(s,6):{lv:s.lv,xp:s.xp};
      return {...s,srs,lv:gx.lv,xp:gx.xp};
    });
    setCount(count+1);
    let q=queue;
    if(g==="again"){ q=[...queue,id]; setQueue(q); }
    if(i+1>=q.length)setDone(true); else { setI(i+1); setK(k+1); }
  }

  if(done){
    return (
      <div className="wrap" style={{justifyContent:"center",alignItems:"center",padding:24,textAlign:"center"}}>
        <div className="pop" style={{fontSize:56}}>🧠</div>
        <div className="brush glint" style={{fontSize:28,marginTop:8}}>{count>0?"復習 完了":"今は静か"}</div>
        {count>0
          ? <div className="mincho" style={{color:"var(--muted)",marginTop:10,lineHeight:1.7}}>{count} 個の言葉を思い出した。<br/>記憶に刻まれていく。</div>
          : <div className="mincho" style={{color:"var(--muted)",marginTop:10,lineHeight:1.7}}>今、思い出すべき言葉はない。<br/>予定をこなして言葉を集めよう。</div>}
        <button className="btn" style={{marginTop:22,minWidth:200}} onClick={onBack}>戻る</button>
      </div>
    );
  }

  const remain=queue.length-i;
  const id=queue[i];
  const card={...CARD_INDEX[id],_id:id};
  return (
    <div className="wrap" style={{padding:16}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",display:"flex"}}><X size={22}/></button>
        <div style={{flex:1,textAlign:"center"}}><span className="eyebrow">思い出す部屋</span></div>
        <span style={{fontSize:12,color:"var(--muted)",fontWeight:700}}>残り {remain}</span>
      </div>
      <div className="bar" style={{marginBottom:16}}><i className="xpf" style={{width:Math.min(100,count/(count+remain)*100)+"%"}}/></div>
      <Question key={k} card={card} onGrade={onGrade}/>
    </div>
  );
}

/* ===================== Shop ===================== */
function Shop({save,update,onBack}){
  function buy(it){ if(save.gold<it.cost)return; update(s=>({...s, gold:s.gold-it.cost, inv:{...s.inv,[it.id]:(s.inv[it.id]||0)+1}})); }
  return (
    <div className="wrap" style={{padding:16}}>
      <TopBar title="コンビニ・売店" sub="Shop" onBack={onBack}/>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:14}}>
        <Coins size={16} color="var(--gold)"/><span style={{fontWeight:800,color:"var(--gold)"}}>{save.gold}</span><span style={{color:"var(--muted)",fontSize:13}}>円</span>
      </div>
      <div className="card" style={{padding:12,marginBottom:14,background:"var(--panel2)"}}>
        <div style={{fontSize:12.5,color:"var(--muted)",lineHeight:1.6}}>体力が減ると報酬が半分に。アイテムは予定表から使って体力を回復できる。</div>
      </div>
      <div style={{display:"grid",gap:10}}>
        {ITEMS.map(it=>{
          const cnt=save.inv[it.id]||0;
          return (
            <div key={it.id} className="card" style={{padding:14}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{fontSize:30}}>{it.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15}}>{it.name} {cnt>0&&<span style={{color:"var(--muted)",fontSize:12}}>×{cnt}</span>}</div>
                  <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.5,marginTop:2}}>{it.desc}</div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:10}}>
                <span style={{fontSize:13,color:"var(--gold)",fontWeight:700}}>{it.cost} 円</span>
                <button className="btn btn-sm" disabled={save.gold<it.cost} onClick={()=>buy(it)}>購入</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ===================== Day cycle (action branches) ===================== */
function ActionCard({node,save,onPick}){
  const lk=actionLock(node,save);
  const done=!!(save.done||{})[node.id];
  const locked=lk.locked;
  const g=node.grammar||GRAMMAR[node.id];
  return (
    <button disabled={locked} onClick={()=>onPick(node)} className="card"
      style={{padding:14,display:"flex",alignItems:"center",gap:13,textAlign:"left",cursor:locked?"default":"pointer",width:"100%",
        border:node.event?"1px solid rgba(240,138,184,.45)":(node.contact?"1px solid rgba(232,198,107,.4)":"1px solid var(--line)"),opacity:locked?.5:1,
        background:node.event?"linear-gradient(180deg,rgba(240,138,184,.07),var(--bg2))":"linear-gradient(180deg,var(--panel),var(--bg2))"}}>
      <div style={{width:44,height:44,borderRadius:12,flex:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:21,background:"var(--panel2)",border:"1px solid var(--line)"}}>
        {locked?<Lock size={18} color="var(--muted)"/>:(DOMAIN_EMOJI[node.domain]||"✨")}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <span className="badge">{node.cefr}</span>
          {node.event&&<span className="badge" style={{color:"var(--aff)"}}>イベント</span>}
          {node.contact&&<span className="badge" style={{color:"var(--gold)"}}>上級接觸</span>}
          {node.reading&&<span className="badge">読解</span>}
          {done&&!locked&&<Check size={14} color="var(--good)"/>}
          <span style={{fontWeight:700,fontSize:15}} className="brush">{node.title}</span>
        </div>
        {g&&!locked&&<div style={{fontSize:11.5,color:"var(--gold)",marginTop:3}}>📌 {g.point}</div>}
        <div className="eyebrow" style={{marginTop:3}}>{node.sub}</div>
        {locked&&<div style={{fontSize:11,color:"var(--hp)",marginTop:4}}>🔒 {lk.reason}</div>}
      </div>
      {!locked&&<div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,flex:"none"}}>
        <span style={{fontSize:11,color:"var(--hp)",display:"flex",alignItems:"center",gap:3}}><Heart size={11}/>-{node.cost}</span>
        <span style={{fontSize:10,color:"var(--muted)"}}>{done?"もう一度":"はじめる"}</span>
      </div>}
    </button>
  );
}
function DayView({save,update,onPick}){
  const energy=save.energy||0;
  const slot=(save.slot||0);
  const idx=clamp(save.dayIdx||0,0,DAYS.length);
  const finishedAll = idx>=DAYS.length;
  const day = finishedAll ? null : DAYS[idx];
  const stage = day ? day.stage : "社会人";
  const affKeys=Object.keys(save.aff||{}).filter(k=>AFF[k]&&(save.aff[k]||0)>0);
  const ownedItems=ITEMS.filter(it=>(save.inv[it.id]||0)>0);
  function useItem(it){ update(s=>({...s, energy:clamp((s.energy||0)+it.heal,0,100), inv:{...s.inv,[it.id]:(s.inv[it.id]||0)-1}})); }
  function rest(){ update(s=>({...s, energy:clamp((s.energy||0)+30,0,100), slot:(s.slot||0)+1})); }
  function nextDay(){ update(s=>{
    const cur=clamp(s.dayIdx||0,0,DAYS.length); const nxt=cur+1;
    const crossing = DAYS[nxt] && DAYS[nxt].stage==="社会人" && (!DAYS[cur]||DAYS[cur].stage!=="社会人") && !s.seenJob;
    return {...s, dayIdx:nxt, slot:0, energy:100, showJob:crossing?true:s.showJob, seenJob:s.seenJob||crossing};
  }); }
  function clearBanner(){ update(s=>({...s, showJob:false})); }

  const Header=(
    <div className="card" style={{padding:14,marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <span style={{display:"flex",alignItems:"center",gap:8}}><Calendar size={16} color="var(--gold)"/><b>{day?day.label:"完"}</b><span className="badge">{stage}編</span></span>
        {day&&<span style={{display:"flex",gap:6,alignItems:"center"}}>{SLOT_NAMES.map((sl,n)=>(
          <span key={n} style={{color:n<slot?"var(--gold)":(n===slot?"var(--ink)":"var(--muted)"),fontWeight:n===slot?800:400,fontSize:13}}>{SLOT_ICON[sl]}</span>
        ))}</span>}
      </div>
      {day&&<div className="eyebrow" style={{marginBottom:10}}>{day.theme}</div>}
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <Heart size={15} color="var(--hp)"/>
        <div className="bar" style={{flex:1}}><i className="enf" style={{width:energy+"%"}}/></div>
        <span style={{fontSize:12,color:"var(--muted)",fontWeight:700}}>体力 {energy}</span>
      </div>
      {affKeys.length>0&&<div style={{marginTop:12,display:"grid",gap:6}}>
        {affKeys.map(kk=>(
          <div key={kk} style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:13,width:92,color:"var(--muted)"}}>{AFF[kk].emoji} {AFF[kk].label}</span>
            <div className="bar" style={{flex:1}}><i className="afff" style={{width:(save.aff[kk]||0)+"%"}}/></div>
          </div>
        ))}
      </div>}
      {ownedItems.length>0&&<div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
        {ownedItems.map(it=>(
          <button key={it.id} className="btn btn-dark btn-sm" onClick={()=>useItem(it)}>{it.emoji} {it.name}×{save.inv[it.id]}（体力+{it.heal}）</button>
        ))}
      </div>}
    </div>
  );

  if(finishedAll){
    return (
      <div style={{padding:"4px 16px 24px"}}>
        {Header}
        <div className="card fade" style={{padding:24,textAlign:"center"}}>
          <div style={{fontSize:46}}>🎓</div>
          <div className="brush glint" style={{fontSize:24,marginTop:8}}>ここまで、おつかれさま</div>
          <div className="mincho" style={{color:"var(--muted)",marginTop:10,fontSize:13.5,lineHeight:1.7}}>今ある日々はすべて生き抜いた。続きの日々は今後の更新で増えていく。<br/>それまでは「復習」で言葉を定着させよう。</div>
        </div>
      </div>
    );
  }

  if(slot>=4){
    return (
      <div style={{padding:"4px 16px 24px"}}>
        {Header}
        <div className="card fade" style={{padding:22,textAlign:"center"}}>
          <div style={{fontSize:44}}>🌙</div>
          <div className="brush glint" style={{fontSize:24,marginTop:6}}>{day.label}、おつかれさま</div>
          <div className="mincho" style={{color:"var(--muted)",marginTop:8,fontSize:13.5,lineHeight:1.7}}>今日も一日を生き抜いた。{DAYS[idx+1]?<><br/>明日は「{DAYS[idx+1].theme}」。</>:<><br/>これが今ある最後の一日。</>}</div>
          <button className="btn" style={{marginTop:18,minWidth:200}} onClick={nextDay}>🌅 翌日へ（体力全回復）</button>
        </div>
      </div>
    );
  }

  const slotName=SLOT_NAMES[slot];
  const flow=day.slots[slotName];
  const actions=flow.actions.map(sceneById).filter(Boolean);

  return (
    <div style={{padding:"4px 16px 24px"}}>
      {Header}
      {save.showJob&&(
        <div className="card fade" style={{padding:16,marginBottom:14,border:"1px solid var(--gold)",background:"linear-gradient(180deg,rgba(232,198,107,.12),var(--bg2))"}}>
          <div className="brush glint" style={{fontSize:18}}>🎉 就職おめでとう</div>
          <div style={{fontSize:13,color:"var(--muted)",marginTop:6,lineHeight:1.6}}>学生生活を終え、社会人編へ。ここから敬語・ビジネス場面が中心になる。</div>
          <button className="btn btn-sm" style={{marginTop:10}} onClick={clearBanner}>はじめる</button>
        </div>
      )}
      <div style={{marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:22}}>{SLOT_ICON[slotName]}</span>
        <span className="brush" style={{fontSize:17}}>{flow.prompt}</span>
      </div>
      <div style={{display:"grid",gap:10}}>
        {actions.map(n=> <ActionCard key={n.id} node={n} save={save} onPick={onPick}/>)}
        <button className="card" onClick={rest} style={{padding:14,display:"flex",alignItems:"center",gap:13,textAlign:"left",cursor:"pointer",width:"100%",border:"1px solid var(--line)"}}>
          <div style={{width:44,height:44,borderRadius:12,flex:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:21,background:"var(--panel2)",border:"1px solid var(--line)"}}>😴</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:15}} className="brush">少し休む</div>
            <div className="eyebrow" style={{marginTop:3}}>Take a breather</div>
          </div>
          <span style={{fontSize:11,color:"var(--good)",display:"flex",alignItems:"center",gap:3,flex:"none"}}><Heart size={11}/>+30</span>
        </button>
      </div>

      <div className="card" style={{padding:14,background:"var(--panel2)",marginTop:18}}>
        <div className="eyebrow" style={{marginBottom:6}}>この旅の到達設計（誠実なCEFR）</div>
        <div style={{fontSize:12.5,color:"var(--muted)",lineHeight:1.7}}>読解：B1＋／受控産出（語体選択・活用・組句）：B1、語体選択肢はB2／上級接觸（敬語・婉曲・慣用の認識）：C1形式を含むが自由産出の認証はなし／聴解：評価には入れず（任意の読み上げあり）、各自で補強。</div>
      </div>
    </div>
  );
}

/* ===================== App ===================== */
function App(){
  const [save,setSave]=useState(null);
  const [loaded,setLoaded]=useState(false);
  const [view,setView]=useState("title");
  const [node,setNode]=useState(null);

  useEffect(()=>{ const s=loadSave(); setSave(normalize(s)); setLoaded(true); },[]);
  function persist(s){ const n=normalize(s); setSave(n); writeSave(n); }
  function update(mut){ setSave(prev=>{ const n=normalize(mut(prev)); writeSave(n); return n; }); }

  if(!loaded) return <div className="wrap" style={{justifyContent:"center",alignItems:"center"}}><div className="brush glint" style={{fontSize:24}}>言ノ葉日記</div></div>;

  if(!save||view==="title"){
    const has=!!save&&Object.keys(save.done||{}).length>0;
    return (
      <div className="wrap" style={{justifyContent:"center",alignItems:"center",padding:28,textAlign:"center"}}>
        <div className="pop" style={{fontSize:54}}>📖</div>
        <div className="brush glint" style={{fontSize:38,marginTop:10,lineHeight:1.2}}>言ノ葉日記</div>
        <div className="eyebrow" style={{marginTop:8}}>Kotodama Life · 日本の毎日で学ぶ</div>
        <div className="mincho" style={{fontSize:13.5,color:"var(--muted)",marginTop:18,lineHeight:1.8,maxWidth:300}}>通学・通勤、食事、買い物、交通、仕事。<br/>日本のふつうの一日を生きながら、言葉を集めて思い出す。<br/>学生編から社会人編、敬語の世界まで。</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:26,width:"100%",maxWidth:260}}>
          {has&&<button className="btn" onClick={()=>{ if(!save)persist(freshSave()); setView("hub"); }}><ChevronRight size={18}/> 続きから</button>}
          <button className={has?"btn btn-dark":"btn"} onClick={()=>{ persist(freshSave()); setView("hub"); }}>{has?"最初から":"はじめる"}</button>
        </div>
      </div>
    );
  }

  if((view==="lesson"||view==="event")&&node) return <Scene node={node} save={save} update={update} onBack={()=>setView("hub")} onDone={()=>setView("hub")}/>;
  if(view==="review") return <Review save={save} update={update} onBack={()=>setView("hub")}/>;
  if(view==="shop") return <Shop save={save} update={update} onBack={()=>setView("hub")}/>;
  if(view==="codex") return <Codex save={save} onBack={()=>setView("hub")}/>;

  const due=dueCards(save).length;
  const xpNext=xpToNext(save.lv);
  return (
    <div className="wrap">
      <div style={{padding:"16px 16px 0"}}>
        <div className="card" style={{padding:14}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:44,height:44,borderRadius:12,background:"var(--panel2)",border:"1px solid var(--line)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flex:"none"}}>🧑‍🎓</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span className="brush" style={{fontSize:16}}>{save.name}</span>
                <span className="badge">Lv.{save.lv}</span>
              </div>
              <div className="bar" style={{marginTop:6}}><i className="xpf" style={{width:(save.xp/xpNext*100)+"%"}}/></div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5,flex:"none"}}><Coins size={15} color="var(--gold)"/><span style={{fontWeight:800,color:"var(--gold)",fontSize:14}}>{save.gold}</span></div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:12}}>
          <button className="card" onClick={()=>setView("review")} style={{padding:"14px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer",position:"relative",border:due>0?"1px solid rgba(240,82,79,.5)":"1px solid var(--line)"}}>
            {due>0&&<span className="dot">{due}</span>}
            <Brain size={22} color={due>0?"var(--hp)":"var(--mana)"}/><span style={{fontSize:12,fontWeight:700}}>復習</span>
          </button>
          <button className="card" onClick={()=>setView("shop")} style={{padding:"14px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer"}}>
            <Store size={22} color="var(--gold)"/><span style={{fontSize:12,fontWeight:700}}>売店</span>
          </button>
          <button className="card" onClick={()=>setView("codex")} style={{padding:"14px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer"}}>
            <BookOpen size={22} color="var(--xp)"/><span style={{fontSize:12,fontWeight:700}}>言ノ葉帳</span>
          </button>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",marginTop:14}}>
        <DayView save={save} update={update} onPick={(n)=>{ setNode(n); setView(n.event?"event":"lesson"); }}/>
      </div>
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
