<style>
:root{
  --bg:#15101f;--bg2:#1c1530;--panel:#241b3d;--panel2:#2c2150;

}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%}
body{margin:0;background:radial-gradient(120% 80% at 50% -10%,#241a40,#15101f 62%);color:var(--ink);font-family:var(--ui);overscroll-behavior:none;-webkit-text-size-adjust:100%}
.wrap{max-width:480px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;position:relative;padding-bottom:env(safe-area-inset-bottom)}
.brush{font-family:var(--jp);font-weight:700;letter-spacing:.02em}
.mincho{font-family:var(--jp)}
.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;padding:13px 18px;font-size:15px;font-weight:700;font-family:var(--ui);cursor:pointer;color:#1a1330;background:var(--gold);transition:transform .08s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;pointer-events:none}
.btn-ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
.btn-dark{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
.btn-sm{padding:8px 12px;font-size:13px;border-radius:10px}
.opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:14px 16px;border-radius:14px;border:1.5px solid var(--line);background:var(--panel);color:var(--ink);font-size:16px;font-family:var(--ui);cursor:pointer;transition:transform .08s,border-color .15s,background .15s}
.opt:active{transform:scale(.985)}
.opt.good{border-color:var(--good);background:rgba(79,209,122,.16)}
.opt.bad{border-color:var(--bad);background:rgba(240,102,79,.16)}
.opt.dim{opacity:.35}
.optkey{width:24px;height:24px;border-radius:7px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--muted);flex:none}
.bar{height:9px;border-radius:99px;background:#0d0a18;overflow:hidden;border:1px solid var(--line)}
.bar>i{display:block;height:100%;border-radius:99px;transition:width .3s}
.hpf{background:linear-gradient(90deg,#f0524f,#ff8a6a)}
.xpf{background:linear-gradient(90deg,#6ad2b4,#9af0c8)}
.afff{background:linear-gradient(90deg,#f08ab8,#ffc2dd)}
.enf{background:linear-gradient(90deg,#f0b84f,#ffe08a)}
.tok{font-family:var(--jp);font-size:18px;font-weight:700;padding:9px 13px;border-radius:11px;border:1.5px solid var(--line);background:var(--panel2);color:var(--ink);cursor:pointer}
.tok:active{transform:scale(.95)}
.tok.used{opacity:.22;pointer-events:none}
.tok.err{border-color:var(--bad);background:rgba(240,102,79,.2)}
.tok.ok{border-color:var(--good);background:rgba(79,209,122,.18)}
.field{width:100%;font-family:var(--jp);font-size:20px;padding:14px;border-radius:12px;border:1.5px solid var(--line);background:#0e0b1a;color:var(--ink);outline:none}
.field:focus{border-color:var(--gold)}
.badge{font-size:10px;font-weight:800;letter-spacing:.06em;padding:3px 7px;border-radius:6px;background:var(--panel2);color:var(--gold);border:1px solid var(--line)}
.dot{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;padding:0 4px;border-radius:99px;background:var(--hp);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
.pop{animation:pop .3s cubic-bezier(.2,1.4,.4,1)}
@keyframes pop{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
.fade{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.glint{background:linear-gradient(90deg,var(--gold),#fff3cf,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
button:focus-visible,.field:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important}}

/* ===================== speech ===================== */
let JP_VOICE=null, TTS_UNLOCKED=false, VOICE_PREF=null;
const VOICE_KEY="kotodama:voice";
try{ VOICE_PREF=localStorage.getItem(VOICE_KEY)||null; }catch(e){}
function jaVoices(){
  try{
    const vs=window.speechSynthesis?.getVoices?.()||[];
    return vs.filter(v=>/ja[-_]?JP/i.test(v.lang)||/日本|Kyoko|Otoya|Hattori|Sayaka|Nanami/i.test(v.name));
  }catch(e){ return []; }
}
function pickVoice(){
  try{ const ja=jaVoices(); JP_VOICE=(VOICE_PREF&&ja.find(v=>v.voiceURI===VOICE_PREF||v.name===VOICE_PREF))||ja[0]||null; }catch(e){}
}
function unlockTTS(){
  if(TTS_UNLOCKED)return;
  try{
    const s=window.speechSynthesis; if(!s)return;
    if(!JP_VOICE)pickVoice();
    const u=new SpeechSynthesisUtterance("\u3042"); u.volume=0; u.lang="ja-JP";
    if(JP_VOICE)u.voice=JP_VOICE; s.speak(u); TTS_UNLOCKED=true;
  }catch(e){}
}
if(typeof window!=="undefined"&&window.speechSynthesis){
  pickVoice();
  window.speechSynthesis.onvoiceschanged=pickVoice;
  window.addEventListener("pointerdown",unlockTTS,{passive:true});
  window.addEventListener("touchstart",unlockTTS,{passive:true});
}
function speak(text,rate){
  try{
    const s=window.speechSynthesis; if(!s||!text)return;
    if(!JP_VOICE)pickVoice();
    TTS_UNLOCKED=true;
    if(s.paused)s.resume();
    s.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="ja-JP"; u.rate=rate||0.88; u.pitch=1.0;
    if(JP_VOICE)u.voice=JP_VOICE; s.speak(u);
  }catch(e){}
}
function clozeTTS(card){
  let p=String(card.prompt||"").replace(/（[^）]*）/g,"");
  const ci=p.indexOf("："); if(ci>=0&&ci<14)p=p.slice(ci+1);
  const ans=String(card.answer||"").replace(/（[^）]*）/g,"");
  p=p.replace(/[＿_]+/g,ans);
  return p.trim();
}

const CARD_INDEX={};
SCENES.forEach(L=>{ (L.quiz||[]).forEach((q,idx)=>{ const id=L.id+":"+idx; CARD_INDEX[id]={...q,_id:id,_lesson:L.id,_cefr:L.cefr}; }); });

/* ===================== helpers ===================== */
function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }
function shuffle(a){ const r=[...a]; for(let i=r.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [r[i],r[j]]=[r[j],r[i]]; } return r; }
function normKana(s){ return (s||"").replace(/\s/g,"").replace(/。/g,"").trim(); }
function xpToNext(lv){ return 40+lv*40; }
function gainXP(s,amt){ let lv=s.lv,xp=s.xp,ups=0; xp+=amt; while(xp>=xpToNext(lv)){ xp-=xpToNext(lv); lv++; ups++; } return {lv,xp,ups}; }
function sceneById(id){ return SCENES.find(s=>s.id===id); }

/* SM-2 lite scheduler */
const MIN=60000, HOUR=3600000, DAY=86400000;
const LEARN=[10];
function schedule(st,grade){
  const now=Date.now();
  st = st ? {...st} : { ease:2.5, ivl:0, due:0, reps:0, lapses:0, phase:"new", step:0 };
  if(st.phase==="new"){
    if(grade==="again"){ st.phase="learning"; st.step=0; st.due=now+1*MIN; }
    else { st.phase="learning"; st.step=0; st.due=now+LEARN[0]*MIN; }
  } else if(st.phase==="learning"){
    if(grade==="again"){ st.step=0; st.due=now+1*MIN; }
    else {
      const ns=st.step+1;
      if(ns>=LEARN.length){ st.phase="review"; st.ivl=1; st.reps+=1; st.due=now+DAY; st.step=0; }
      else { st.step=ns; st.due=now+LEARN[ns]*MIN; }
    }
  } else {
    if(grade==="again"){ st.lapses+=1; st.ease=Math.max(1.3,st.ease-0.2); st.phase="learning"; st.step=0; st.ivl=Math.max(1,Math.round(st.ivl*0.4)); st.due=now+1*MIN; }
    else if(grade==="hard"){ st.ease=Math.max(1.3,st.ease-0.15); st.ivl=Math.max(1,Math.round(st.ivl*1.2)); st.reps+=1; st.due=now+st.ivl*DAY; }
    else { st.ivl=Math.max(1,Math.round(st.ivl*st.ease)); st.reps+=1; st.due=now+st.ivl*DAY; }
  }
  return st;
}
function dueCards(s){
  const now=Date.now();
  return Object.keys(s.srs||{}).filter(id=>CARD_INDEX[id] && s.srs[id].due<=now+12*HOUR);
}
function sampleCards(lessonIds,n){
  const pool=Object.keys(CARD_INDEX).filter(id=>lessonIds.includes(CARD_INDEX[id]._lesson));
  return shuffle(pool).slice(0,n).map(id=>({...CARD_INDEX[id],_id:id}));
}
function freshSave(){
  return { name:"あなた", lv:1, xp:0, gold:60, dayIdx:0, slot:0, energy:100, seenJob:false, showJob:false, seenGuide:false,
    done:{}, srs:{}, codex:{}, aff:{}, inv:{}, exams:{}, created:Date.now() };
}
function normalize(s){
  if(!s) return s;
  s.done=s.done||{}; s.srs=s.srs||{}; s.codex=s.codex||{}; s.aff=s.aff||{}; s.inv=s.inv||{};
  if(typeof s.gold!=="number")s.gold=0; if(typeof s.lv!=="number")s.lv=1; if(typeof s.xp!=="number")s.xp=0;
  if(typeof s.dayIdx!=="number")s.dayIdx=(typeof s.day==="number"?s.day-1:0); if(s.dayIdx<0)s.dayIdx=0;
  if(typeof s.slot!=="number")s.slot=0;
  if(typeof s.energy!=="number")s.energy=100;
  if(typeof s.seenJob!=="boolean")s.seenJob=false;
  if(typeof s.showJob!=="boolean")s.showJob=false;
  if(typeof s.seenGuide!=="boolean")s.seenGuide=true;
  if(!s.exams||typeof s.exams!=="object")s.exams={};
  if(!s.name)s.name="あなた";
  return s;
}

  const [choices]=useState(()=> (k==="mc"||k==="cloze"||k==="listen_reply")?shuffle(card.choices||[]):[]);
  const [pool]=useState(()=>{
    if(k==="build") return shuffle((card.pool||[]).map((w,i)=>({w,i})));
    if(k==="dictation"){
      const ans=String((card.accept&&card.accept[0])||"").split("");
      const kata=/[\u30a1-\u30fa\u30fc]/.test(ans.join(""));
      const bank=(kata
        ?"アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンガギグゲゴザジズゼゾダヂヅデドバビブベボパピプペポーッャュョ"
        :"あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんがぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽっゃゅょー").split("");
      const used=new Set(ans);
      const extra=shuffle(bank.filter(c=>!used.has(c))).slice(0,4);
      return shuffle([...ans,...extra].map((w,i)=>({w,i})));
    }
    return [];
  });

  function grade(){ onGrade(ok?(hintUsed?"hard":"good"):"again"); }
  const hardBtn=(threeGrade&&done&&ok)?()=>onGrade("hard"):null;
  function useHint(){
    if(hintUsed||done)return;
    const wrong=choices.map((c,i)=>i).filter(i=>choices[i]!==card.answer&&!dim.includes(i));
    if(wrong.length){ setDim([...dim,wrong[(Math.random()*wrong.length)|0]]); setHintUsed(true); }
  }

  if(k==="mc"||k==="cloze"){
    return (
      <div className="fade">

            else if(dim.includes(idx))cls+=" dim";
            return (
              <button key={idx} className={cls} disabled={done||dim.includes(idx)} onClick={()=>{ if(done)return; setPicked(c); setOk(c===card.answer); setDone(true); }}>
                <span className="optkey">{String.fromCharCode(65+idx)}</span>
                <span style={{flex:1}}>{c}</span>

        </div>}
        <Footer done={done} ok={ok} onNext={grade} onHint={!done?useHint:null} hintUsed={hintUsed} onHard={hardBtn}/>

  if(k==="listen_reply"){
    return (

            <button className="opt" style={{justifyContent:"center",fontSize:14}} onClick={()=>onGrade("good")}>できた</button>
            <button className="opt" style={{justifyContent:"center",fontSize:14}} onClick={()=>onGrade("hard")}>おしい</button>
            <button className="opt" style={{justifyContent:"center",fontSize:14}} onClick={()=>onGrade("again")}>まだ</button>
          </div>
        </>}
      </div>
    );
  }

  if(k==="shadow"){
    return (
      <div className="fade">
        <div className="card" style={{padding:24,marginBottom:14,textAlign:"center"}}>
          <div className="eyebrow" style={{marginBottom:14}}>聞いて、まねて声に出す</div>
          <div className="brush" style={{fontSize:30,marginBottom:6}}>{card.jp}</div>
          <div className="mincho" style={{fontSize:14,color:"var(--muted)",marginBottom:16}}>{card.meaning}</div>
          <button className="btn" onClick={()=>speak(card.jp)} style={{margin:"0 auto"}}><Volume2 size={18}/> 聞く</button>
        </div>
        <div style={{fontSize:13,color:"var(--muted)",textAlign:"center",marginBottom:8}}>声に出して言えたら：</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <button className="opt" style={{justifyContent:"center"}} onClick={()=>onGrade("good")}>言えた</button>
          <button className="opt" style={{justifyContent:"center"}} onClick={()=>onGrade("again")}>もう一度</button>
        </div>
      </div>
    );
  }

  return null;
}
function Footer({done,ok,onNext,onHint,hintUsed,onHard}){
  return (
    <div style={{marginTop:18}}>
      {!done&&onHint&&<div style={{textAlign:"center",marginBottom:10}}>
        <button className="btn btn-dark btn-sm" onClick={onHint} disabled={hintUsed}><Star size={14}/> ヒント（1つ消す）</button>
      </div>}
      {done&&(onHard&&ok
        ? <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <button className="btn btn-dark" style={{border:"1px solid var(--line)"}} onClick={onHard}>難しかった</button>
            <button className="btn" onClick={onNext}>できた <ChevronRight size={16}/></button>
          </div>
        : <button className="btn" style={{width:"100%"}} onClick={onNext}>
            {ok?"正解！ ":"次へ "}<ChevronRight size={18}/>
          </button>)}
    </div>
  );
}

/* ===================== Scene (lesson/event) ===================== */
function Scene({node,save,update,onDone,onBack,onJump}){
  const [cards]=useState(()=> (node.event||node.exam) ? sampleCards(node.sample,node.sampleN||10) : (node.quiz||[]).map((q,idx)=>({...q,_id:node.id+":"+idx})) );
  const [phase,setPhase]=useState("teach");
  const [i,setI]=useState(0);
  const [k,setK]=useState(0);
  const right=useRef(0);
  const grades=useRef({});
  const [reward,setReward]=useState(null);
  const tired=(save.energy||0)>0?1:0.5;

  function finish(){
    cards.forEach(c=>{ if(!grades.current[c._id]) grades.current[c._id]="good"; });
    const wrongIds=cards.filter(c=>grades.current[c._id]==="again").map(c=>c._id);
    const pct=Math.round(right.current/Math.max(1,cards.length)*100);
    const replay=!!(save.done && save.done[node.id] && !node.event);
    const factor=replay?0.5:1;
    const gold=Math.round(right.current*8*tired*factor)+(node.event?40:0);
    const xpAmt=Math.round((cards.length*20+40)*tired*factor);
    update(s=>{
      const srs={...s.srs};
      cards.forEach(c=>{ srs[c._id]=schedule(srs[c._id],grades.current[c._id]); });
      const codex={...s.codex};
      (node.teach||[]).forEach(t=>{ codex[t.jp]={jp:t.jp,reading:t.reading||t.jp,meaning:t.meaning,cefr:node.cefr}; });
      const aff={...(s.aff||{})};
      (node.aff||[]).forEach(key=>{ aff[key]=clamp((aff[key]||0)+20,0,100); });
      const g=gainXP(s,xpAmt);
      const energy=clamp((s.energy||0)-(node.cost||25),0,100);
      const slot=((s.slot||0)+1);
      const exams=node.exam?{...(s.exams||{}),[node.id]:{best:Math.max(((s.exams||{})[node.id]||{}).best||0,pct),last:pct,at:Date.now()}}:(s.exams||{});
      return {...s, srs, codex, aff, energy, slot, exams, done:{...s.done,[node.id]:true}, gold:s.gold+gold, lv:g.lv, xp:g.xp};
    });
    setReward({gold,xp:xpAmt,right:right.current,total:cards.length,pct,wrongIds});
    setPhase("done");
  }
  function onGrade(g){
    grades.current[cards[i]._id]=g;
    if(g!=="again")right.current+=1;
    if(i+1>=cards.length)finish();
    else { setI(i+1); setK(k+1); }
  }

  if(phase==="done"&&reward){
    const stars=Math.max(0,Math.round(reward.right/Math.max(1,reward.total)*3));
    return (
      <div className="wrap" style={{justifyContent:"center",alignItems:"center",padding:24,textAlign:"center"}}>
        <div className="pop" style={{fontSize:58}}>{DOMAIN_EMOJI[node.domain]||"\u2728"}</div>
        <div className="brush glint" style={{fontSize:28,marginTop:8}}>一場面、クリア</div>
        <div className="mincho" style={{color:"var(--muted)",marginTop:6}}>{node.title}</div>
        <div style={{marginTop:14,fontSize:24,letterSpacing:4}}>
          {[0,1,2].map(n=><span key={n} style={{color:n<stars?"var(--gold)":"var(--line)"}}>★</span>)}
        </div>
        <div className="card" style={{padding:16,marginTop:18,width:"100%",maxWidth:300}}>
          <Row icon={<Check size={16} color="var(--good)"/>} label="正解" val={reward.right+" / "+reward.total}/>
          <div style={{height:8}}/>
          <Row icon={<Coins size={16} color="var(--gold)"/>} label="お金" val={"+"+reward.gold}/>
          <div style={{height:8}}/>
          <Row icon={<Star size={16} color="var(--xp)"/>} label="経験値" val={"+"+reward.xp}/>
          {(node.aff||[]).length>0&&<><div style={{height:8}}/>
            <Row icon={<Heart size={16} color="var(--aff)"/>} label="好感度" val={node.aff.map(a=>AFF[a].label).join("・")+" +20"}/></>}
        </div>
        {node.exam&&(()=>{
          const best=((save.exams||{})[node.id]||{}).best||reward.pct;
          const wrongScenes=[...new Set((reward.wrongIds||[]).map(id=>id.split(":")[0]))].map(sid=>SCENES.find(x=>x.id===sid)).filter(Boolean);
          return (
            <div className="card" style={{padding:14,marginTop:14,width:"100%",maxWidth:300,textAlign:"left"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                <span className="eyebrow">腕試しの結果</span>
                <span className="brush" style={{fontSize:22,color:reward.pct>=80?"var(--good)":"var(--gold)"}}>{reward.pct}%</span>
              </div>
              <div style={{fontSize:11.5,color:"var(--muted)",marginTop:2}}>ベスト {Math.max(best,reward.pct)}%（統計に記録）</div>
              {wrongScenes.length>0&&<div style={{marginTop:10}}>
                <div style={{fontSize:12,color:"var(--gold)",fontWeight:700,marginBottom:6}}>間違えた文型 → タップで復習へ</div>
                <div style={{display:"grid",gap:6}}>
                  {wrongScenes.map(sc=>{ const g=sc.grammar||GRAMMAR[sc.id]; return (
                    <button key={sc.id} className="opt" style={{padding:"9px 12px"}} onClick={()=>onJump&&onJump(sc)}>
                      <span style={{flex:1,minWidth:0}}>
                        <span className="mincho" style={{fontSize:13.5,display:"block"}}>{g?g.point:sc.title}</span>
                        <span style={{fontSize:11,color:"var(--muted)"}}>{sc.title}</span>
                      </span>
                      <ChevronRight size={14} color="var(--muted)"/>
                    </button>
                  );})}
                </div>
              </div>}
              {wrongScenes.length===0&&<div style={{fontSize:12.5,color:"var(--good)",marginTop:8}}>全問正解。この段階は仕上がっている。</div>}
            </div>
          );
        })()}
        {tired<1&&<div style={{fontSize:12,color:"var(--hp)",marginTop:10}}>※ 体力切れで報酬が半分に。休んでから挑もう。</div>}
        <div className="card" style={{padding:12,marginTop:14,width:"100%",maxWidth:300,background:"var(--panel2)"}}>
          <div style={{fontSize:12.5,color:"var(--muted)",lineHeight:1.6}}>覚えた言葉は<b style={{color:"var(--ink)"}}>復習（思い出す部屋）</b>に届く。忘れかけた頃に出てくるので、毎日のぞくと定着する。</div>
        </div>
        <button className="btn" style={{marginTop:20,minWidth:220}} onClick={onDone}><Calendar size={18}/> 予定表へ戻る</button>
      </div>
    );
  }

  if(phase==="teach"){
    return (
      <div className="wrap" style={{padding:16}}>
        <TopBar title={node.title} sub={node.sub} onBack={onBack}/>
        <div className="card fade" style={{padding:18,marginBottom:14}}>
          <div className="eyebrow" style={{marginBottom:8,display:"flex",gap:8,alignItems:"center"}}>
            <span>{DOMAIN_EMOJI[node.domain]} {node.cefr} · {node.stage}</span>
            {node.contact&&<span className="badge" style={{color:"var(--aff)"}}>上級接觸・認識のみ</span>}
          </div>
          <div className="mincho" style={{fontSize:14.5,lineHeight:1.8,color:"var(--ink)"}}>{node.setting}</div>
        </div>
        {(() => { const g=node.grammar||GRAMMAR[node.id]; if(!g)return null; return (
          <div className="card fade" style={{padding:16,marginBottom:14,border:"1px solid rgba(232,198,107,.45)",background:"linear-gradient(180deg,rgba(232,198,107,.08),var(--bg2))"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:8}}>
              <div className="eyebrow" style={{color:"var(--gold)"}}>📌 今日の文型</div>
              {g.jlpt&&<span style={{fontSize:11,fontWeight:700,color:"var(--gold)",border:"1px solid rgba(232,198,107,.45)",borderRadius:6,padding:"2px 8px",flex:"none"}}>{g.jlpt}</span>}
            </div>
            <div className="brush" style={{fontSize:20}}>{g.point}</div>
            <div className="mincho" style={{fontSize:13,color:"var(--muted)",marginTop:4}}>{g.gloss}</div>
            {g.connect&&<div style={{marginTop:10,fontSize:12.5,lineHeight:1.6}}><span style={{color:"var(--gold)",fontWeight:700}}>接続　</span><span className="mincho">{g.connect}</span></div>}
            {g.breakdown&&g.breakdown.length>0&&<div style={{marginTop:10}}>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"stretch"}}>
                {g.breakdown.map((b,n)=>(<span key={n} style={{display:"inline-flex",flexDirection:"column",alignItems:"center",gap:2,background:"rgba(255,255,255,.05)",border:"1px solid var(--line)",borderRadius:8,padding:"4px 9px"}}>
                  <span className="mincho" style={{fontSize:14,fontWeight:600}}>{b.t}</span>
                  <span style={{fontSize:10,color:"var(--muted)",whiteSpace:"nowrap"}}>{b.g}</span>
                </span>))}
              </div>
              {g.literal&&<div style={{marginTop:8,fontSize:12.5,lineHeight:1.6}}><span style={{color:"var(--gold)",fontWeight:700}}>直譯　</span>{g.literal}</div>}
            </div>}
            {g.example&&<div style={{marginTop:12,paddingTop:10,borderTop:"1px solid var(--line)",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
              <span className="mincho" style={{fontSize:15}}>{g.example}</span>
              <button className="btn-dark" onClick={()=>speak(g.example)} style={{width:32,height:32,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid var(--line)",cursor:"pointer",flex:"none"}}><Volume2 size={14}/></button>
            </div>}
          </div>
        ); })()}
        {node.reading&&node.passage&&(
          <div className="card fade" style={{padding:18,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div className="eyebrow">本文</div>
              <Listen text={node.passage} label="読み上げ"/>
            </div>
            <div className="mincho" style={{fontSize:16,lineHeight:2}}>{node.passage}</div>
            {node.gloss&&<div style={{marginTop:14,paddingTop:12,borderTop:"1px solid var(--line)",display:"grid",gap:6}}>
              {node.gloss.map((g,n)=><div key={n} style={{display:"flex",justifyContent:"space-between",fontSize:13,gap:10}}><span className="mincho">{g.jp}</span><span style={{color:"var(--muted)",textAlign:"right"}}>{g.meaning}</span></div>)}
            </div>}
          </div>
        )}
        {(node.teach||[]).length>0&&<div className="fade" style={{display:"grid",gap:8,marginBottom:16}}>
          {node.teach.map((t,n)=>(
            <div key={n} className="card" style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
              <div style={{flex:1,minWidth:0}}>
                <div className="brush" style={{fontSize:18}}>{t.jp}</div>
                {t.reading&&t.reading!==t.jp&&<div style={{fontSize:11,color:"var(--muted)"}}>{t.reading}</div>}
              </div>
              <div className="mincho" style={{fontSize:13,color:"var(--muted)",textAlign:"right",maxWidth:160}}>{t.meaning}</div>
              <button className="btn-dark" onClick={()=>speak(t.reading||t.jp)} style={{width:34,height:34,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid var(--line)",cursor:"pointer",flex:"none"}}><Volume2 size={15}/></button>
            </div>
          ))}
        </div>}
        {node.event&&<div className="card fade" style={{padding:14,marginBottom:14,background:"var(--panel2)"}}>
          <div style={{fontSize:13,color:"var(--muted)",lineHeight:1.6}}>このイベントは、これまでの場面から言葉をランダムに呼び出す<b style={{color:"var(--ink)"}}>振り返り</b>。記憶を交ぜて思い出すと、定着が強くなる。</div>
        </div>}
        <button className="btn" style={{width:"100%"}} onClick={()=>setPhase("quiz")}>{node.reading?"読解に挑む":"場面を始める"}（{cards.length}問）<ChevronRight size={18}/></button>
      </div>
    );
  }

  return (
    <div className="wrap" style={{padding:16}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",display:"flex"}}><X size={22}/></button>
        <div className="bar" style={{flex:1}}><i className="xpf" style={{width:(i/cards.length*100)+"%"}}/></div>
        <span style={{fontSize:12,color:"var(--muted)",fontWeight:700}}>{i+1}/{cards.length}</span>
      </div>
      <Question key={k} card={cards[i]} onGrade={onGrade}/>
    </div>
  );
}

/* ===================== Review (SRS) ===================== */
function isWeak(st){ return st && ((st.lapses||0)>=2 || (st.ease||2.5)<=2.1); }
function ReadingCard({card,onGrade}){
  const qs=card.qs||[];
  const [qi,setQi]=useState(0);
  const [shuffled]=useState(()=>qs.map(t=>shuffle(t.choices)));
  const [picked,setPicked]=useState(null);
  const [wrong,setWrong]=useState(0);
  const [allDone,setAllDone]=useState(false);
  const t=qs[qi];
  const qDone=picked!==null;
  const readText=()=>speak(String(card.text||"").replace(/（[^）]*）/g,"").replace(/\n/g,"。"));
  function next(){
    if(qi+1>=qs.length)setAllDone(true);
    else { setQi(qi+1); setPicked(null); }
  }
  return (
    <div className="fade">
      <div className="card" style={{padding:16,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span className="eyebrow">📄 読解 · {card.label||"短文"}</span>
          <div style={{display:"flex",gap:6}}>
            <button className="btn-dark btn-sm" style={{border:"1px solid var(--line)",borderRadius:8,padding:"3px 9px",cursor:"pointer"}} onClick={readText}><Volume2 size={13}/></button>
            <button className="btn-dark btn-sm" style={{border:"1px solid var(--line)",borderRadius:8,padding:"3px 9px",cursor:"pointer"}} onClick={()=>speak(String(card.text||"").replace(/（[^）]*）/g,"").replace(/\n/g,"。"),0.62)}>🐢</button>
          </div>
        </div>
        <div className="mincho" style={{fontSize:15,lineHeight:2,whiteSpace:"pre-line"}}>{card.text}</div>
      </div>
      {!allDone&&<>
        <div style={{fontSize:13,marginBottom:10}}><span className="eyebrow">問 {qi+1}/{qs.length}</span>　<b>{t.q}</b></div>
        <div style={{display:"grid",gap:10}}>
          {shuffled[qi].map((c,idx)=>{
            const isAns=c===t.answer; let cls="opt";
            if(qDone){ if(isAns)cls+=" good"; else if(picked===c)cls+=" bad"; else cls+=" dim"; }
            return (
              <button key={idx} className={cls} disabled={qDone} onClick={()=>{ setPicked(c); if(c!==t.answer)setWrong(w=>w+1); }}>
                <span className="optkey">{String.fromCharCode(65+idx)}</span>
                <span style={{flex:1}}>{c}</span>
                {qDone&&isAns&&<Check size={18} color="var(--good)"/>}
              </button>
            );
          })}
        </div>
        {qDone&&<button className="btn" style={{width:"100%",marginTop:12}} onClick={next}>{qi+1>=qs.length?"読解を終える":"次の問へ"} <ChevronRight size={15}/></button>}
      </>}
      {allDone&&<>
        <div className="card pop" style={{padding:14}}>
          <div style={{fontSize:13,fontWeight:700,color:wrong===0?"var(--good)":"var(--gold)",marginBottom:6}}>{wrong===0?"全問正解！":qs.length-wrong+" / "+qs.length+" 正解"}</div>
          <div style={{fontSize:12,color:"var(--gold)",fontWeight:700,marginBottom:4}}>訳</div>
          <div style={{fontSize:13,lineHeight:1.8,color:"var(--muted)"}}>{card.cn}</div>
        </div>
        <Footer done={true} ok={wrong===0} onNext={()=>onGrade(wrong===0?"good":"again")}/>
      </>}
    </div>
  );
}
function DialogCard({card,onGrade}){
  const turns=card.turns||[];
  const [ti,setTi]=useState(0);
  const [shuffled]=useState(()=>turns.map(t=>shuffle(t.choices)));
  const [picked,setPicked]=useState(null);
  const [wrong,setWrong]=useState(0);
  const [allDone,setAllDone]=useState(false);
  const t=turns[ti];
  const turnDone=picked!==null;
  useEffect(()=>{ const id=setTimeout(()=>speak(t.jp),80); return ()=>clearTimeout(id); },[ti]);
  function next(){
    if(ti+1>=turns.length){ setAllDone(true); }
    else { setTi(ti+1); setPicked(null); }
  }
  if(allDone){
    const ok=wrong===0;
    return (
      <div className="fade">
        <div className="card pop" style={{padding:18,textAlign:"center"}}>
          <div style={{fontSize:40}}>{ok?"🎉":"💬"}</div>
          <div className="brush" style={{fontSize:20,marginTop:6}}>{ok?"会話成立！":"会話終了"}</div>
          <div style={{fontSize:12.5,color:"var(--muted)",marginTop:6}}>{turns.length} 輪中 {turns.length-wrong} 輪選對。</div>
          <div style={{marginTop:12,display:"grid",gap:8,textAlign:"left"}}>
            {turns.map((x,n)=>(<div key={n} style={{fontSize:12.5,lineHeight:1.6}}>
              <div className="mincho">🗣 {x.jp}</div>
              <div style={{color:"var(--good)"}}>→ {x.answer}</div>
            </div>))}
          </div>
        </div>
        <Footer done={true} ok={ok} onNext={()=>onGrade(ok?"good":"again")}/>
      </div>
    );
  }
  return (
    <div className="fade">
      <div className="card" style={{padding:18,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span className="eyebrow">会話 · 話 {ti+1}/{turns.length}</span>
          <span style={{fontSize:11,color:"var(--muted)"}}>連續對話：聽一句、回一句</span>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
          <button className="btn" onClick={()=>speak(t.jp)}><Volume2 size={18}/> 音を聞く</button>
          <button className="btn btn-dark" onClick={()=>speak(t.jp,0.62)}>🐢 ゆっくり</button>
        </div>
      </div>
      <div style={{display:"grid",gap:10}}>
        {shuffled[ti].map((c,idx)=>{
          const isAns=c===t.answer; let cls="opt";
          if(turnDone){ if(isAns)cls+=" good"; else if(picked===c)cls+=" bad"; else cls+=" dim"; }
          return (
            <button key={idx} className={cls} disabled={turnDone} onClick={()=>{ setPicked(c); if(c!==t.answer)setWrong(w=>w+1); }}>
              <span className="optkey">{String.fromCharCode(65+idx)}</span>
              <span style={{flex:1}} className="mincho">{c}</span>
              {turnDone&&isAns&&<Check size={18} color="var(--good)"/>}
            </button>
          );
        })}
      </div>
      {turnDone&&<div className="card pop" style={{padding:12,marginTop:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
          <span className="mincho" style={{fontSize:14,lineHeight:1.6}}>{t.jp}</span>
          <button className="btn-dark" onClick={()=>speak(t.jp)} style={{width:30,height:30,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid var(--line)",cursor:"pointer",flex:"none"}}><Volume2 size={13}/></button>
        </div>
        <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>{t.cn}</div>
        <button className="btn" style={{width:"100%",marginTop:10}} onClick={next}>{ti+1>=turns.length?"会話を終える":"次の一言へ"} <ChevronRight size={15}/></button>
      </div>}
    </div>
  );
}
/* ============ 逆引き（産出）カード ============ */
function RevCard({entry,onGrade}){
  const clean=(entry.reading||"").replace(/[〜～]/g,"");
  const tileable=clean.length>0&&clean.length<=6&&!/[〜～]/.test(entry.jp)&&/^[\u3041-\u3096\u30a1-\u30fa\u30fc]+$/.test(clean);
  const [revealed,setRevealed]=useState(false);
  const [chosen,setChosen]=useState([]);
  const [checked,setChecked]=useState(false);
  const [ok,setOk]=useState(false);
  const [pool]=useState(()=>{
    if(!tileable)return [];
    const ans=clean.split("");
    const kata=/[\u30a1-\u30fa\u30fc]/.test(clean);
    const bank=(kata?"アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンガギグゲゴザジズゼゾダヂヅデドバビブベボパピプペポーッャュョ":"あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんがぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽっゃゅょー").split("");
    const used=new Set(ans);
    return shuffle([...ans,...shuffle(bank.filter(c=>!used.has(c))).slice(0,4)].map((w,i)=>({w,i})));
  });
  const built=chosen.map(c=>c.w).join("");
  const usedIdx=chosen.map(c=>c.i);
  const G3=({retry})=>(
    <div style={{display:"grid",gridTemplateColumns:retry?"1fr":"1fr 1fr",gap:10,marginTop:14}}>
      {retry
        ? <button className="btn" onClick={()=>onGrade("again")}>もう一度 <ChevronRight size={15}/></button>
        : <>
            <button className="btn btn-dark" style={{border:"1px solid var(--line)"}} onClick={()=>onGrade("hard")}>難しかった</button>
            <button className="btn" onClick={()=>onGrade("good")}>できた <ChevronRight size={15}/></button>
          </>}
    </div>
  );
  return (
    <div className="fade">
      <div className="card" style={{padding:20,marginBottom:14,textAlign:"center"}}>
        <div className="eyebrow" style={{marginBottom:8}}>🗣 逆引き · 中文 → 日文</div>
        <div style={{fontSize:20,fontWeight:800,lineHeight:1.6}}>{entry.meaning}</div>
        <div style={{fontSize:11.5,color:"var(--muted)",marginTop:6}}>先在腦中（或出聲）說出日文，再作答</div>
      </div>
      {tileable&&!checked&&<>
        <div style={{minHeight:50,display:"flex",flexWrap:"wrap",gap:8,padding:12,border:"1.5px dashed var(--line)",borderRadius:12,marginBottom:12,background:"#0e0b1a",justifyContent:"center"}}>
          {chosen.length===0&&<span style={{color:"var(--muted)",fontSize:13,alignSelf:"center"}}>用仮名磚拼出來</span>}
          {chosen.map((c,n)=><button key={n} className="tok" onClick={()=>setChosen(chosen.filter((_,m)=>m!==n))}>{c.w}</button>)}
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginBottom:12}}>
          {pool.map((t,n)=>{ const u=usedIdx.includes(t.i);
            return <button key={n} className={"tok"+(u?" dim":"")} disabled={u} onClick={()=>setChosen([...chosen,t])}>{t.w}</button>; })}
        </div>
        <div style={{display:"flex",justifyContent:"center",gap:10}}>
          <button className="btn btn-dark" disabled={!chosen.length} onClick={()=>setChosen(chosen.slice(0,-1))}>一字消す</button>
          <button className="btn" disabled={!chosen.length} onClick={()=>{ const good=normKana(built)===normKana(clean); setOk(good); setChecked(true); speak(entry.reading); }}><Check size={16}/> 確認</button>
        </div>
      </>}
      {tileable&&checked&&<div className="card pop" style={{padding:16,textAlign:"center"}}>
        <div style={{fontSize:13,fontWeight:700,color:ok?"var(--good)":"var(--bad)"}}>{ok?"正解！":"正しくは"}</div>
        <div className="brush" style={{fontSize:26,marginTop:6}}>{entry.jp}</div>
        {entry.reading!==entry.jp&&<div className="mincho" style={{fontSize:14,color:"var(--muted)",marginTop:2}}>{entry.reading}</div>}
        <G3 retry={!ok}/>
      </div>}
      {!tileable&&!revealed&&<div style={{display:"flex",justifyContent:"center"}}>
        <button className="btn" onClick={()=>{ setRevealed(true); speak(entry.reading||entry.jp); }}>答えを見る</button>
      </div>}
      {!tileable&&revealed&&<div className="card pop" style={{padding:16,textAlign:"center"}}>
        <div className="brush" style={{fontSize:24}}>{entry.jp}</div>
        {entry.reading!==entry.jp&&<div className="mincho" style={{fontSize:14,color:"var(--muted)",marginTop:2}}>{entry.reading}</div>}
        <div style={{fontSize:11.5,color:"var(--muted)",marginTop:8}}>誠實自評：說得出來嗎？</div>
        <G3 retry={false}/>
        <button className="btn-dark btn-sm" style={{border:"none",background:"none",color:"var(--muted)",cursor:"pointer",fontSize:12,marginTop:8}} onClick={()=>onGrade("again")}>言えなかった（もう一度）</button>
      </div>}
    </div>
  );
}
function Review({save,update,onBack}){
  const [queue,setQueue]=useState([]);
  const [started,setStarted]=useState(false);
  const [i,setI]=useState(0);
  const [k,setK]=useState(0);
  const [count,setCount]=useState(0);
  const [done,setDone]=useState(false);
  const [mode,setMode]=useState("all");

  const dueAll=dueCards(save);
  const revDue=Object.values(save.codex||{}).filter(e=>{ const st=(save.srs||{})["rev:"+e.jp]; return !st||st.due<=Date.now(); });
  const weakAll=Object.keys(save.srs||{}).filter(id=>CARD_INDEX[id]&&isWeak(save.srs[id]));
  function start(m){
    setMode(m);
    const q=m==="rev"?shuffle(revDue).slice(0,20):shuffle(m==="weak"?weakAll:dueAll);
    if(q.length===0){ setDone(true); setStarted(true); return; }
    setQueue(q); setI(0); setK(0); setCount(0); setDone(false); setStarted(true);
  }

  function onGrade(g){
    const id=mode==="rev"?("rev:"+queue[i].jp):queue[i];
    update(s=>{
      const srs={...s.srs}; srs[id]=schedule(srs[id],g);
      const gx=g!=="again"?gainXP(s,6):{lv:s.lv,xp:s.xp};
      return {...s,srs,lv:gx.lv,xp:gx.xp};
    });
    setCount(count+1);
    let q=queue;
    if(g==="again"){ q=[...queue,id]; setQueue(q); }
    if(i+1>=q.length)setDone(true); else { setI(i+1); setK(k+1); }
  }

  if(!started){
    return (
      <div className="wrap" style={{padding:16}}>
        <TopBar title="思い出す部屋" sub="Retrieval · 檢索練習" onBack={onBack}/>
        <div className="card" style={{padding:18,marginBottom:12}}>
          <div className="brush" style={{fontSize:17,marginBottom:6}}>🧠 期限が来た言葉</div>
          <div style={{fontSize:12.5,color:"var(--muted)",lineHeight:1.6,marginBottom:12}}>依 SM-2 間隔到期的卡。答對 +6xp。</div>
          <button className="btn" disabled={dueAll.length===0} onClick={()=>start("all")} style={{width:"100%"}}>はじめる（{dueAll.length} 枚）</button>
        </div>
        <div className="card" style={{padding:18,marginBottom:12}}>
          <div className="brush" style={{fontSize:17,marginBottom:6}}>🗣 逆引き（産出）</div>
          <div style={{fontSize:12.5,color:"var(--muted)",lineHeight:1.6,marginBottom:12}}>看中文→自己說出日文。短詞用假名磚拼、長詞揭示後誠實自評。一回最多 20 語（A2–B1 產出範圍）。</div>
          <button className="btn" disabled={revDue.length===0} onClick={()=>start("rev")} style={{width:"100%"}}>産出モード（{Math.min(20,revDue.length)} 語）</button>
        </div>
        <div className="card" style={{padding:18}}>
          <div className="brush" style={{fontSize:17,marginBottom:6}}>🔥 苦手だけ</div>
          <div style={{fontSize:12.5,color:"var(--muted)",lineHeight:1.6,marginBottom:12}}>錯過兩次以上、或記憶度偏低的卡。錯誤驅動，效率最高。</div>
          <button className="btn btn-dark" disabled={weakAll.length===0} onClick={()=>start("weak")} style={{width:"100%",border:"1px solid var(--line)"}}>苦手をつぶす（{weakAll.length} 枚）</button>
        </div>
      </div>
    );
  }

  if(done){
    return (
      <div className="wrap" style={{justifyContent:"center",alignItems:"center",padding:24,textAlign:"center"}}>
        <div className="pop" style={{fontSize:56}}>🧠</div>
        <div className="brush glint" style={{fontSize:28,marginTop:8}}>{count>0?"復習 完了":"今は静か"}</div>
        {count>0
          ? <div className="mincho" style={{color:"var(--muted)",marginTop:10,lineHeight:1.7}}>{count} 個の言葉を思い出した。<br/>記憶に刻まれていく。</div>
          : <div className="mincho" style={{color:"var(--muted)",marginTop:10,lineHeight:1.7}}>今、思い出すべき言葉はない。<br/>予定をこなして言葉を集めよう。</div>}
        <button className="btn" style={{marginTop:22,minWidth:200}} onClick={onBack}>戻る</button>
      </div>
    );
  }

  const remain=queue.length-i;
  const id=queue[i];
  const card=mode==="rev"?null:{...CARD_INDEX[id],_id:id};
  return (
    <div className="wrap" style={{padding:16}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",display:"flex"}}><X size={22}/></button>
        <div style={{flex:1,textAlign:"center"}}><span className="eyebrow">思い出す部屋</span></div>
        <span style={{fontSize:12,color:"var(--muted)",fontWeight:700}}>残り {remain}</span>
      </div>
      <div className="bar" style={{marginBottom:16}}><i className="xpf" style={{width:Math.min(100,count/(count+remain)*100)+"%"}}/></div>
      {mode==="rev"
        ? <RevCard key={k} entry={queue[i]} onGrade={onGrade}/>
        : <Question key={k} card={card} onGrade={onGrade} threeGrade/>}
    </div>
  );
}

function Shop({save,update,onBack}){
  function buy(it){ if(save.gold<it.cost)return; update(s=>({...s, gold:s.gold-it.cost, inv:{...s.inv,[it.id]:(s.inv[it.id]||0)+1}})); }
  return (
    <div className="wrap" style={{padding:16}}>
      <TopBar title="コンビニ・売店" sub="Shop" onBack={onBack}/>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:14}}>
        <Coins size={16} color="var(--gold)"/><span style={{fontWeight:800,color:"var(--gold)"}}>{save.gold}</span><span style={{color:"var(--muted)",fontSize:13}}>円</span>
      </div>
      <div className="card" style={{padding:12,marginBottom:14,background:"var(--panel2)"}}>
        <div style={{fontSize:12.5,color:"var(--muted)",lineHeight:1.6}}>体力が減ると報酬が半分に。アイテムは予定表から使って体力を回復できる。</div>
      </div>
      <div style={{display:"grid",gap:10}}>
        {ITEMS.map(it=>{
          const cnt=save.inv[it.id]||0;
          return (
            <div key={it.id} className="card" style={{padding:14}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{fontSize:30}}>{it.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15}}>{it.name} {cnt>0&&<span style={{color:"var(--muted)",fontSize:12}}>×{cnt}</span>}</div>
                  <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.5,marginTop:2}}>{it.desc}</div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:10}}>
                <span style={{fontSize:13,color:"var(--gold)",fontWeight:700}}>{it.cost} 円</span>
                <button className="btn btn-sm" disabled={save.gold<it.cost} onClick={()=>buy(it)}>購入</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

    const alts=new Set([v]);

      const i=(Math.random()*(d.length-1))|0; [d[i],d[i+1]]=[d[i+1],d[i]]; return parseInt(d.join(""),10); };
    const cands=shuffle([v*10, Math.round(v/10), digitSwap(v), digitSwap(v), v+((v>=1000)?1000:100), Math.max(10,v-((v>=1000)?1000:100))]);
    for(const c of cands){ if(alts.size>=4)break; if(c>=10&&!alts.has(c))alts.add(c); }
    const fmt=x=>x.toLocaleString("en-US")+"円";

    if(nDone)return;
    setNPick(c); setNDone(true);
    if(c===nTarget.show){ const s2=nStreak+1; setNStreak(s2); if(s2>nBest)setNBest(s2); setTimeout(()=>newNum(),800); }
    else setNStreak(0);
  }
  const col=qScript==="hira"?0:1;
  function newQ(script){
    const sc=script||qScript;
    const c=sc==="hira"?0:1;
    const t=KANA_FLAT[(Math.random()*KANA_FLAT.length)|0];
    const wrong=shuffle(KANA_FLAT.filter(x=>x!==t)).slice(0,3);
    setTarget(t); setQChoices(shuffle([t,...wrong])); setQDone(false); setQPick(null);
    setTimeout(()=>speak(t[c]),50);
  }
  function pick(c){
    if(qDone)return;
    setQPick(c); setQDone(true);
    if(c===target){ const s2=streak+1; setStreak(s2); if(s2>best)setBest(s2); setTimeout(()=>newQ(),700); }
    else setStreak(0);
  }
  const Tab=({id,label})=>(
    <button className={tab===id?"btn btn-sm":"btn btn-dark btn-sm"} onClick={()=>{ setTab(id); if(id==="quiz")setTimeout(()=>newQ(),60); }}>{label}</button>
  );
  return (
    <div className="wrap" style={{padding:16}}>
      <TopBar title="道場" sub="Dojo · 五十音と数字" onBack={onBack}/>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <Tab id="hira" label="ひらがな"/><Tab id="kata" label="カタカナ"/><Tab id="quiz" label="🎧 聽音選字"/>
        <button className={tab==="num"?"btn btn-sm":"btn btn-dark btn-sm"} onClick={()=>{ setTab("num"); setTimeout(()=>newNum(),60); }}>💴 数字</button>
        <button className={tab==="kanji"?"btn btn-sm":"btn btn-dark btn-sm"} onClick={()=>{ setTab("kanji"); setTimeout(()=>newKanji(),60); }}>㊗️ 漢字</button>
        <button className={tab==="keigo"?"btn btn-sm":"btn btn-dark btn-sm"} onClick={()=>{ setTab("keigo"); setTimeout(()=>newKeigo(),60); }}>👔 敬語</button>
      </div>
      {tab==="keigo"&&<>
        <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
          <span style={{fontSize:12.5,color:"var(--muted)"}}>普通體 → 選正確的敬語版</span>
          <span style={{marginLeft:"auto",fontSize:12,color:"var(--muted)"}}>連続 <b style={{color:"var(--gold)"}}>{gStreak}</b> · 最高 {gBest}</span>
        </div>
        {gTarget&&<>
          <div className="card" style={{padding:18,textAlign:"center",marginBottom:12}}>
            <div className="eyebrow" style={{marginBottom:8}}>{gTarget.who}</div>
            <div className="mincho" style={{fontSize:22}}>{gTarget.plain}</div>
            <div style={{fontSize:11.5,color:"var(--muted)",marginTop:6}}>↓ 敬語では？</div>
          </div>
          <div style={{display:"grid",gap:10}}>
            {gChoices.map((c,i)=>{
              let cls="opt"; if(gDone){ if(c===gTarget.answer)cls+=" good"; else if(gPick===c)cls+=" bad"; else cls+=" dim"; }
              return <button key={i} className={cls} disabled={gDone} onClick={()=>pickKeigo(c)}>
                <span className="optkey">{String.fromCharCode(65+i)}</span>
                <span style={{flex:1}} className="mincho">{c}</span>
                {gDone&&c===gTarget.answer&&<Check size={18} color="var(--good)"/>}
              </button>;
            })}
          </div>
          {gDone&&<div className="card pop" style={{padding:12,marginTop:12}}>
            <div style={{fontSize:12.5,lineHeight:1.7}}>💡 {gTarget.note}</div>
            <button className="btn" style={{width:"100%",marginTop:10}} onClick={()=>newKeigo()}>次へ <ChevronRight size={15}/></button>
          </div>}
        </>}
      </>}
      {tab==="kanji"&&<>
        {kanjiPool.length<4
        ? <div className="card" style={{padding:26,textAlign:"center",color:"var(--muted)"}}>
            <div style={{fontSize:34,marginBottom:8}}>㊗️</div>
            <div className="mincho" style={{lineHeight:1.8,fontSize:13.5}}>漢字題庫來自你的「言ノ葉帳」。<br/>先到場面收集 4 個以上含漢字的言葉，<br/>這裡就會開張。</div>
          </div>
        : <>
          <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
            <span style={{fontSize:12.5,color:"var(--muted)"}}>從你收集的 {kanjiPool.length} 個漢字詞出題</span>
            <span style={{marginLeft:"auto",fontSize:12,color:"var(--muted)"}}>連続 <b style={{color:"var(--gold)"}}>{kStreak}</b> · 最高 {kBest}</span>
          </div>
          <div className="card" style={{padding:22,textAlign:"center",marginBottom:12}}>
            <div style={{fontSize:12,color:"var(--muted)",marginBottom:8}}>選出正確的讀音</div>
            <div className="brush" style={{fontSize:38,lineHeight:1.3}}>{kTarget?kTarget.jp:""}</div>
            {kDone&&<div style={{fontSize:12.5,color:"var(--muted)",marginTop:8}}>{kTarget.meaning}</div>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {kChoices.map((c,i)=>{
              let cls="opt"; if(kDone){ if(c===kTarget.reading)cls+=" good"; else if(kPick===c)cls+=" bad"; else cls+=" dim"; }
              return <button key={i} className={cls} disabled={kDone&&kPick===kTarget.reading} onClick={()=>pickKanji(c)} style={{justifyContent:"center"}}>
                <span className="mincho" style={{fontSize:17}}>{c}</span>
              </button>;
            })}
          </div>
          {kDone&&kPick!==kTarget.reading&&<div style={{textAlign:"center",marginTop:12}}>
            <div style={{fontSize:13,color:"var(--muted)",marginBottom:8}}>正解：<span className="mincho" style={{fontSize:17,color:"var(--ink)"}}>{kTarget.reading}</span></div>
            <button className="btn btn-sm" onClick={()=>newKanji()}>次へ</button>
          </div>}
        </>}
      </>}
      {tab==="num"&&<>
        <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
          <button className={numMode==="price"?"btn btn-sm":"btn btn-dark btn-sm"} onClick={()=>{setNumMode("price");setNStreak(0);setTimeout(()=>newNum("price"),60);}}>金額</button>
          <button className={numMode==="time"?"btn btn-sm":"btn btn-dark btn-sm"} onClick={()=>{setNumMode("time");setNStreak(0);setTimeout(()=>newNum("time"),60);}}>時刻</button>
          <span style={{marginLeft:"auto",fontSize:12,color:"var(--muted)"}}>連続 <b style={{color:"var(--gold)"}}>{nStreak}</b> · 最高 {nBest}</span>
        </div>
        <div className="card" style={{padding:20,textAlign:"center",marginBottom:12}}>
          <div style={{fontSize:13,color:"var(--muted)",marginBottom:10}}>{numMode==="price"?"聽價格，選出正確金額（真實生存第一關）":"聽時刻，選出正確時間"}</div>
          <div style={{display:"flex",gap:8,justifyContent:"center"}}>
            <button className="btn" onClick={()=>nTarget&&speak(nTarget.say)}><Volume2 size={18}/> もう一度</button>
            <button className="btn btn-dark" onClick={()=>nTarget&&speak(nTarget.say,0.6)}>🐢</button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {nChoices.map((c,i)=>{
            let cls="opt"; if(nDone){ if(c===nTarget.show)cls+=" good"; else if(nPick===c)cls+=" bad"; else cls+=" dim"; }
            return <button key={i} className={cls} disabled={nDone&&nPick===nTarget.show} onClick={()=>pickNum(c)} style={{justifyContent:"center"}}>
              <span className="brush" style={{fontSize:22}}>{c}</span>
            </button>;
          })}
        </div>
        {nDone&&nPick!==nTarget.show&&<div style={{textAlign:"center",marginTop:12}}>
          <div style={{fontSize:13,color:"var(--muted)",marginBottom:8}}>正解：<span className="brush" style={{fontSize:20,color:"var(--ink)"}}>{nTarget.show}</span></div>
          <button className="btn btn-sm" onClick={()=>newNum()}>次へ</button>
        </div>}
      </>}
      {(tab==="hira"||tab==="kata")&&<>
        <div style={{fontSize:12.5,color:"var(--muted)",marginBottom:10}}>點任一格聽發音。羅馬字僅供入門對照，之後盡快脫離。</div>
        <div style={{display:"grid",gap:6}}>
          {KANA_ROWS.map((row,ri)=>(
            <div key={ri} style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
              {row.map((cell,ci)=> cell
                ? <button key={ci} className="card" onClick={()=>speak(tab==="hira"?cell[0]:cell[1])} style={{padding:"10px 4px",textAlign:"center",cursor:"pointer"}}>
                    <div className="brush" style={{fontSize:22,lineHeight:1.2}}>{tab==="hira"?cell[0]:cell[1]}</div>
                    <div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>{cell[2]}</div>
                  </button>
                : <div key={ci}/>)}
            </div>
          ))}
        </div>
      </>}
      {tab==="quiz"&&<>
        <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
          <button className={qScript==="hira"?"btn btn-sm":"btn btn-dark btn-sm"} onClick={()=>{setQScript("hira");setStreak(0);setTimeout(()=>newQ("hira"),60);}}>ひらがな</button>
          <button className={qScript==="kata"?"btn btn-sm":"btn btn-dark btn-sm"} onClick={()=>{setQScript("kata");setStreak(0);setTimeout(()=>newQ("kata"),60);}}>カタカナ</button>
          <span style={{marginLeft:"auto",fontSize:12,color:"var(--muted)"}}>連続 <b style={{color:"var(--gold)"}}>{streak}</b> · 最高 {best}</span>
        </div>
        <div className="card" style={{padding:20,textAlign:"center",marginBottom:12}}>
          <div style={{fontSize:13,color:"var(--muted)",marginBottom:10}}>聽發音，選出對的假名</div>
          <div style={{display:"flex",gap:8,justifyContent:"center"}}>
            <button className="btn" onClick={()=>target&&speak(target[col])}><Volume2 size={18}/> もう一度</button>
            <button className="btn btn-dark" onClick={()=>target&&speak(target[col],0.6)}>🐢</button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {qChoices.map((c,i)=>{
            let cls="opt"; if(qDone){ if(c===target)cls+=" good"; else if(qPick===c)cls+=" bad"; else cls+=" dim"; }
            return <button key={i} className={cls} disabled={qDone&&qPick===target} onClick={()=>pick(c)} style={{justifyContent:"center"}}>
              <span className="brush" style={{fontSize:26}}>{c[col]}</span>
            </button>;
          })}
        </div>
        {qDone&&qPick!==target&&<div style={{textAlign:"center",marginTop:12}}>
          <div style={{fontSize:13,color:"var(--muted)",marginBottom:8}}>正解：<span className="brush" style={{fontSize:20,color:"var(--ink)"}}>{target[col]}</span>（{target[2]}）</div>
          <button className="btn btn-sm" onClick={()=>newQ()}>次へ</button>
        </div>}
      </>}
    </div>
  );
}

/* ===================== Save code (存檔碼) ===================== */
function SaveIO({save,onImport}){
  const [open,setOpen]=useState(false);
  const [txt,setTxt]=useState("");
  const [msg,setMsg]=useState("");
  function doExport(){
    try{
      const code=btoa(unescape(encodeURIComponent(JSON.stringify(save||{}))));
      setTxt(code);
      try{ navigator.clipboard&&navigator.clipboard.writeText(code); setMsg("已產生並複製存檔碼。請貼到備忘錄自行保存。"); }
      catch(e){ setMsg("已產生存檔碼。請全選複製，貼到備忘錄保存。"); }
    }catch(e){ setMsg("匯出失敗。"); }
  }
  function doImport(){
    try{
      const o=JSON.parse(decodeURIComponent(escape(atob(txt.trim()))));
      if(!o||typeof o!=="object")throw 0;
      onImport(o);
    }catch(e){ setMsg("存檔碼無效：請確認有完整貼上。"); }
  }
  if(!open) return <button className="btn btn-dark btn-sm" style={{marginTop:14}} onClick={()=>setOpen(true)}>💾 存檔碼（備份／還原）</button>;
  return (
    <div className="card" style={{padding:14,marginTop:14,width:"100%",maxWidth:320,textAlign:"left"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span className="eyebrow">存檔碼</span>
        <button className="btn-dark btn-sm" style={{border:"1px solid var(--line)",borderRadius:8,padding:"2px 8px",cursor:"pointer"}} onClick={()=>setOpen(false)}>閉じる</button>
      </div>
      <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.6,marginBottom:8}}>進度存在這台裝置的瀏覽器裡。清除瀏覽資料會消失——備份請匯出存檔碼；換裝置則在新裝置貼上還原。</div>
      <textarea className="field" value={txt} onChange={e=>setTxt(e.target.value)} placeholder="貼上存檔碼以還原；或按下方匯出" rows={3} style={{width:"100%",fontSize:11,fontFamily:"monospace",resize:"vertical"}}/>
      <div style={{display:"flex",gap:8,marginTop:8}}>
        {save&&<button className="btn btn-sm" onClick={doExport}>匯出＋複製</button>}
        <button className="btn btn-dark btn-sm" disabled={!txt.trim()} onClick={doImport}>還原此存檔</button>
      </div>
      {msg&&<div style={{fontSize:11.5,color:"var(--gold)",marginTop:8,lineHeight:1.5}}>{msg}</div>}
    </div>
  );
}

/* ===================== First-run guide ===================== */
function Guide({onDone}){
  const [step,setStep]=useState(0);
  const STEPS=[
    {icon:"あ",title:"まず、音から",body:"看不懂假名？先去「道場」——五十音表點格發音、聽音選字。零基礎的地板在這裡補。已經會讀的人可以直接跳過。"},
    {icon:"🌅",title:"一日は四つの予定",body:"主線是「日子」：朝・昼・夕・夜各選一件事做。每個場面＝一個文型＋一批言葉。做完四格，就寢，翌日へ。"},
    {icon:"🧠",title:"忘れかけた頃に",body:"學過的言葉會進「思い出す部屋」。在快忘記的時機回想一次，才真正長進記憶。看到🧠有數字，先復習再開新場面。"},
  ];
  const s=STEPS[step];
  const last=step===STEPS.length-1;
  return (
    <div style={{position:"fixed",inset:0,zIndex:60,background:"rgba(10,8,20,.82)",backdropFilter:"blur(3px)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div className="card pop" style={{padding:22,maxWidth:340,width:"100%",textAlign:"center"}}>
        <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:14}}>
          {STEPS.map((_,n)=>(<span key={n} style={{width:7,height:7,borderRadius:99,background:n===step?"var(--gold)":"var(--line)"}}/>))}
        </div>
        <div className="brush" style={{fontSize:38,lineHeight:1}}>{s.icon}</div>
        <div className="brush" style={{fontSize:20,marginTop:10}}>{s.title}</div>
        <div style={{fontSize:13,color:"var(--muted)",lineHeight:1.8,marginTop:10,textAlign:"left"}}>{s.body}</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:18}}>
          {!last&&<button className="btn" onClick={()=>setStep(step+1)}>次へ <ChevronRight size={15}/></button>}
          {last&&<>
            <button className="btn" onClick={()=>onDone(true)}>あ　道場（五十音）から始める</button>
            <button className="btn btn-dark" onClick={()=>onDone(false)}>もう読める。予定から始める</button>
          </>}
          {!last&&<button className="btn-dark btn-sm" style={{border:"none",background:"none",color:"var(--muted)",cursor:"pointer",fontSize:12}} onClick={()=>onDone(false)}>スキップ</button>}
        </div>
      </div>
    </div>
  );
}

/* ===================== App ===================== */
function App(){
  const [save,setSave]=useState(null);
  const [loaded,setLoaded]=useState(false);
  const [view,setView]=useState("title");
  const [node,setNode]=useState(null);

  useEffect(()=>{ const s=loadSave(); setSave(normalize(s)); setLoaded(true); },[]);
  function persist(s){ const n=normalize(s); setSave(n); writeSave(n); }
  function update(mut){ setSave(prev=>{ const n=normalize(mut(prev)); writeSave(n); return n; }); }

  if(!loaded) return <div className="wrap" style={{justifyContent:"center",alignItems:"center"}}><div className="brush glint" style={{fontSize:24}}>言ノ葉日記</div></div>;

  if(!save||view==="title"){
    const has=!!save&&Object.keys(save.done||{}).length>0;
    return (
      <div className="wrap" style={{justifyContent:"center",alignItems:"center",padding:28,textAlign:"center"}}>
        <div className="pop" style={{fontSize:54}}>📖</div>
        <div className="brush glint" style={{fontSize:38,marginTop:10,lineHeight:1.2}}>言ノ葉日記</div>
        <div className="eyebrow" style={{marginTop:8}}>Kotodama Life · 日本の毎日で学ぶ</div>
        <div className="mincho" style={{fontSize:13.5,color:"var(--muted)",marginTop:18,lineHeight:1.8,maxWidth:300}}>通学・通勤、食事、買い物、交通、仕事。<br/>日本のふつうの一日を生きながら、言葉を集めて思い出す。<br/>学生編から社会人編、敬語の世界まで。</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:26,width:"100%",maxWidth:260}}>
          {has&&<button className="btn" onClick={()=>{ if(!save)persist(freshSave()); setView("hub"); }}><ChevronRight size={18}/> 続きから</button>}
          <button className={has?"btn btn-dark":"btn"} onClick={()=>{ persist(freshSave()); setView("hub"); }}>{has?"最初から":"はじめる"}</button>
        </div>
        <SaveIO save={save} onImport={(o)=>{ persist(o); setView("hub"); }}/>
      </div>
    );
  }

  if((view==="lesson"||view==="event")&&node) return <Scene key={node.id} node={node} save={save} update={update} onBack={()=>setView("hub")} onDone={()=>setView("hub")} onJump={(sc)=>{ setNode(sc); setView("lesson"); }}/>;
  if(view==="review") return <Review save={save} update={update} onBack={()=>setView("hub")}/>;
  if(view==="shop") return <Shop save={save} update={update} onBack={()=>setView("hub")}/>;
  if(view==="codex") return <Codex save={save} onBack={()=>setView("hub")}/>;
  if(view==="kana") return <KanaDojo save={save} onBack={()=>setView("hub")}/>;

  const due=dueCards(save).length;
  const xpNext=xpToNext(save.lv);
  return (
    <div className="wrap">
      {!save.seenGuide&&<Guide onDone={(goKana)=>{ update(s=>({...s,seenGuide:true})); if(goKana)setView("kana"); }}/>}
      <div style={{padding:"16px 16px 0"}}>
        <div className="card" style={{padding:14}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:44,height:44,borderRadius:12,background:"var(--panel2)",border:"1px solid var(--line)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flex:"none"}}>🧑‍🎓</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span className="brush" style={{fontSize:16}}>{save.name}</span>
                <span className="badge">Lv.{save.lv}</span>
              </div>
              <div className="bar" style={{marginTop:6}}><i className="xpf" style={{width:(save.xp/xpNext*100)+"%"}}/></div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5,flex:"none"}}><Coins size={15} color="var(--gold)"/><span style={{fontWeight:800,color:"var(--gold)",fontSize:14}}>{save.gold}</span></div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginTop:12}}>
          <button className="card" onClick={()=>setView("review")} style={{padding:"14px 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer",position:"relative",border:due>0?"1px solid rgba(240,82,79,.5)":"1px solid var(--line)"}}>
            {due>0&&<span className="dot">{due}</span>}
            <Brain size={21} color={due>0?"var(--hp)":"var(--mana)"}/><span style={{fontSize:11.5,fontWeight:700}}>復習</span>
          </button>
          <button className="card" onClick={()=>setView("kana")} style={{padding:"14px 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer"}}>
            <span style={{fontSize:21,fontWeight:800,lineHeight:"21px",color:"var(--aff)"}} className="brush">あ</span><span style={{fontSize:11.5,fontWeight:700}}>道場</span>
          </button>
          <button className="card" onClick={()=>setView("shop")} style={{padding:"14px 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer"}}>
            <Store size={21} color="var(--gold)"/><span style={{fontSize:11.5,fontWeight:700}}>売店</span>
          </button>
          <button className="card" onClick={()=>setView("codex")} style={{padding:"14px 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer"}}>
            <BookOpen size={21} color="var(--xp)"/><span style={{fontSize:11.5,fontWeight:700}}>言ノ葉帳</span>
          </button>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",marginTop:14}}>
        <DayView save={save} update={update} onPick={(n)=>{ setNode(n); setView(n.event?"event":"lesson"); }} onReview={()=>setView("review")}/>
      </div>
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App/>);
</script>
